<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Golf OTD Guide - Lineup Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --bg-navy: #0a192f;
        --bg-navy-light: #112240;
        --bg-card: #1d2d50;
        --text-main: #ccd6f6;
        --text-muted: #8892b0;
        --border-subtle: rgba(255, 255, 255, 0.1);
        --border-gold: #d4af37;
        --gold-light: #f3e5ab;
        --gold-mid: #d4af37;
        --danger: #ff4d4d;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-navy);
        color: var(--text-main);
        line-height: 1.6;
      }

      header {
        background: linear-gradient(180deg, var(--bg-navy-light) 0%, var(--bg-navy) 100%);
        padding: 1.5rem;
        border-bottom: 1px solid var(--border-gold);
        text-align: center;
      }

      h1 { color: var(--gold-light); font-size: 1.8rem; margin-bottom: 0.5rem; }

      .sub-nav-container {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-top: 1rem;
      }

      .sub-nav-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-size: 1rem;
        font-weight: 600;
        padding: 0.5rem 1rem;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.3s ease;
      }

      .sub-nav-btn:hover { color: var(--text-main); }
      .sub-nav-btn.active { color: var(--gold-light); border-bottom: 2px solid var(--gold-mid); }

      .content-view {
          display: none;
          max-width: 1200px;
          margin: 2rem auto;
          padding: 0 1rem;
          animation: fadeIn 0.3s ease-out;
      }
      
      .content-view.active { display: grid; }

      #builder-view {
          grid-template-columns: 1fr;
          gap: 2rem;
      }

      @media (min-width: 768px) {
          #builder-view { grid-template-columns: 1fr 1fr; }
      }

      .panel {
          background: var(--bg-navy-light);
          border: 1px solid var(--border-subtle);
          border-radius: 12px;
          padding: 1.5rem;
          display: flex;
          flex-direction: column;
          height: 80vh;
      }

      .panel-header {
          font-size: 1.2rem;
          font-weight: 700;
          color: var(--gold-light);
          margin-bottom: 1rem;
          display: flex;
          justify-content: space-between;
          align-items: center;
      }

      .search-box {
          width: 100%;
          padding: 0.75rem 1rem;
          background: rgba(0,0,0,0.3);
          border: 1px solid var(--border-subtle);
          border-radius: 8px;
          color: var(--text-main);
          margin-bottom: 1rem;
          font-size: 1rem;
      }
      .search-box:focus { outline: none; border-color: var(--gold-mid); }

      .scrollable-list {
          flex: 1;
          overflow-y: auto;
          display: flex;
          flex-direction: column;
          gap: 0.75rem;
          padding-right: 0.5rem;
      }

      .scrollable-list::-webkit-scrollbar { width: 6px; }
      .scrollable-list::-webkit-scrollbar-track { background: transparent; }
      .scrollable-list::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }

      .player-card {
          background: rgba(0,0,0,0.2);
          border: 1px solid var(--border-subtle);
          border-radius: 8px;
          padding: 1rem;
          display: flex;
          justify-content: space-between;
          align-items: center;
          transition: background 0.2s;
      }
      .player-card:hover { background: rgba(255,255,255,0.05); }

      .player-info { display: flex; flex-direction: column; }
      .player-name { font-weight: 600; font-size: 1rem; color: var(--text-main); }
      .player-stats { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
      
      .action-btn {
          background: var(--bg-card);
          border: 1px solid var(--border-gold);
          color: var(--gold-light);
          border-radius: 6px;
          padding: 0.5rem 1rem;
          cursor: pointer;
          font-weight: bold;
          transition: all 0.2s;
      }
      .action-btn:hover { background: var(--gold-mid); color: var(--bg-navy); }
      .action-btn.remove { border-color: var(--danger); color: var(--danger); }
      .action-btn.remove:hover { background: var(--danger); color: #fff; }

      .multiplier-badge {
          background: var(--bg-navy);
          color: var(--gold-light);
          border: 1px solid var(--border-gold);
          border-radius: 12px;
          padding: 0.1rem 0.5rem;
          font-size: 0.75rem;
          font-weight: bold;
          margin-left: 0.5rem;
      }

      .captain-slot {
          border: 2px solid var(--border-gold);
          background: rgba(212, 175, 55, 0.05);
      }

      #loading-indicator {
          text-align: center;
          padding: 2rem;
          color: var(--gold-mid);
          font-weight: bold;
          animation: pulse 1.5s infinite;
          display: none;
      }

      /* --- Leaderboard & Draft Dropdowns --- */
      .leaderboard-panel {
          background: var(--bg-navy-light);
          border: 1px solid var(--border-subtle);
          border-radius: 12px;
          overflow: hidden;
          margin-top: 1rem;
          box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .leaderboard-header {
          background: linear-gradient(to right, #0b3d2c, #145943);
          color: #fff;
          padding: 1rem 1.5rem;
          font-weight: 700;
          font-size: 1.2rem;
          border-bottom: 2px solid var(--border-gold);
          display: flex;
          justify-content: space-between;
          align-items: center;
      }

      .golf-table-container { overflow-x: auto; }
      .golf-table { width: 100%; border-collapse: collapse; text-align: left; }
      .golf-table th {
          background: rgba(0,0,0,0.4);
          color: var(--text-muted);
          font-size: 0.75rem;
          text-transform: uppercase;
          padding: 0.75rem 1rem;
          border-bottom: 1px solid var(--border-subtle);
          white-space: nowrap;
      }
      .golf-table td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.95rem; white-space: nowrap; }

      .main-row { cursor: pointer; transition: background 0.2s; }
      .main-row:hover { background: rgba(255,255,255,0.08) !important; }
      .main-row.open .toggle-icon { transform: rotate(180deg); }
      .toggle-icon { font-size: 0.7rem; color: var(--text-muted); transition: transform 0.3s ease; display: inline-block; float: right; margin-top: 4px; }

      .draft-row { display: none; background: rgba(0,0,0,0.3); }
      .draft-row.open { display: table-row; }
      
      .draft-content { padding: 1rem 2rem; min-height: 100px; }
      .draft-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
      .draft-item:last-child { border-bottom: none; }
      .draft-item-info { display: flex; align-items: center; gap: 12px; }
      .draft-item-avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border-subtle); background: #000; }
      .draft-item-name { color: var(--text-main); font-weight: 500; font-size: 0.9rem; }
      .draft-item-score { font-weight: 700; font-size: 0.95rem; color: var(--gold-mid); }
      .draft-item-mult { font-size: 0.65rem; background: var(--bg-navy); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border-gold); color: var(--gold-light); font-weight: bold; }

      .col-pos { width: 60px; text-align: center; font-weight: 700; color: var(--text-muted); }
      .col-player { font-weight: 600; color: var(--text-main); }
      .col-score { width: 80px; text-align: center; font-weight: 700; font-size: 1.1rem; }
      .col-thru { width: 80px; text-align: center; font-weight: 500; color: var(--text-muted); }

      .score-under { color: #ff4d4d; }
      .score-even { color: #2ecc71; }
      .score-over { color: var(--text-main); }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hashids@2.2.10/dist/hashids.min.js"></script>
</head>
<body>

    <header>
        <h1>Golf OTD Guide</h1>
        <div class="sub-nav-container">
            <button class="sub-nav-btn active" id="tab-builder" onclick="switchTab('builder')">Lineup Builder</button>
            <button class="sub-nav-btn" id="tab-leaderboard" onclick="switchTab('leaderboard')">Live Leaderboard</button>
            <button class="sub-nav-btn" id="tab-saved" onclick="switchTab('saved')">Saved Lineups</button>
        </div>
    </header>

    <div id="builder-view" class="content-view active">
        <div class="panel">
            <div class="panel-header"><span>Player Pool</span></div>
            <input type="text" id="player-search" class="search-box" placeholder="Search golfers...">
            <div id="loading-indicator">Syncing User Data...</div>
            <div class="scrollable-list" id="player-pool-list"></div>
        </div>
        <div class="panel">
            <div class="panel-header"><span>Your Lineup</span><span id="salary-rem">Rem: $50,000</span></div>
            <div class="scrollable-list" id="current-lineup-list"></div>
        </div>
    </div>

    <div id="saved-view" class="content-view">
        <div class="panel" style="height: auto;">
            <div class="panel-header">My Saved Lineups</div>
            <p style="color: var(--text-muted); text-align: center; padding: 2rem;">No saved lineups yet.</p>
        </div>
    </div>

    <div id="leaderboard-view" class="content-view">
        <div class="leaderboard-panel">
            <div class="leaderboard-header">
                <span>🏆 Live Tournament Leaderboard</span>
                <span style="font-size: 0.9rem; font-weight: 400; color: var(--gold-light);">RealApp Live Sync</span>
            </div>
            <div class="golf-table-container">
                <table class="golf-table">
                    <thead>
                        <tr>
                            <th class="col-pos">POS</th>
                            <th class="col-player">PLAYER</th>
                            <th class="col-score">TOTAL</th>
                            <th class="col-thru">THRU</th>
                            <th class="col-score">TODAY</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const config = {
            usersDataUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNfMOTfQ4xpIILu_IPjjOAZjUq2Tfp1UqEMOVnR2Qyz-H572bmiIWbC-GuUlEW7ogM8TUNLFWw5xz3/pub?gid=0&single=true&output=csv', 
            workerProxy: 'https://rda-worker.coledecker04.workers.dev/',
            REAL_AUTH_TOKEN: 'xnr5VpW3!ApZk8L2E!4fe6e26f-949f-4936-ae3e-16384878932f',
            REAL_VERSION: '27'
        };

        const DEVICE_UUID = crypto.randomUUID();
        let golfers = [
            { id: 1, name: "Scottie Scheffler", salary: 11500, points: 95.5 },
            { id: 2, name: "Rory McIlroy", salary: 11000, points: 91.2 },
            { id: 3, name: "Jon Rahm", salary: 10800, points: 89.8 },
            { id: 4, name: "Xander Schauffele", salary: 10500, points: 85.0 },
            { id: 5, name: "Viktor Hovland", salary: 10200, points: 83.5 },
            { id: 6, name: "Ludvig Aberg", salary: 9100, points: 77.2 }
        ];
        
        let users = [];
        let draftsCache = {}; 
        let lineup = [];
        const MAX_SALARY = 50000;

        function generateRequestToken() {
            const hasher = new Hashids("realwebapp", 16);
            return hasher.encode(Date.now());
        }

        function base64ToText(base64String) {
            if (!base64String) return '';
            try {
                const binStr = atob(base64String);
                const bytes = new Uint8Array(binStr.length);
                for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
                return new TextDecoder().decode(bytes);
            } catch (e) { return ''; }
        }

        async function fetchBatchViaWorker(urls) {
            const queryParams = new URLSearchParams();
            urls.forEach(url => queryParams.append('url', url));
            const urlString = config.workerProxy + '?' + queryParams.toString();
            
            const res = await fetch(urlString, {
                headers: {
                    'real-auth-info': config.REAL_AUTH_TOKEN,
                    'real-device-name': 'Chrome on Web',
                    'real-device-type': 'desktop_web',
                    'real-device-uuid': DEVICE_UUID,
                    'real-request-token': generateRequestToken(),
                    'real-version': config.REAL_VERSION
                }
            });
            return res.json();
        }

        window.switchTab = (tabName) => {
            document.querySelectorAll('.content-view').forEach(el => el.classList.remove('active'));
            document.getElementById(`${tabName}-view`).classList.add('active');
            document.querySelectorAll('.sub-nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
        };

        function renderPool(filterText = "") {
            const poolEl = document.getElementById('player-pool-list');
            if (!poolEl) return;
            poolEl.innerHTML = '';
            golfers.filter(g => !lineup.some(l => l.id === g.id) && g.name.toLowerCase().includes(filterText.toLowerCase())).forEach(g => {
                const el = document.createElement('div');
                el.className = 'player-card';
                el.innerHTML = `<div class="player-info"><span class="player-name">${g.name}</span><span class="player-stats">Sal: $${g.salary.toLocaleString()}</span></div><button class="action-btn" onclick="addPlayer(${g.id})">ADD</button>`;
                poolEl.appendChild(el);
            });
        }

        function renderLineup() {
            const lineupEl = document.getElementById('current-lineup-list');
            if (!lineupEl) return;
            lineupEl.innerHTML = '';
            let currentSalary = lineup.reduce((sum, p) => sum + p.salary, 0);
            document.getElementById('salary-rem').innerText = `Rem: $${(MAX_SALARY - currentSalary).toLocaleString()}`;
            lineup.forEach((g, index) => {
                const isCaptain = index === 0;
                const el = document.createElement('div');
                el.className = isCaptain ? 'player-card captain-slot' : 'player-card';
                el.innerHTML = `<div class="player-info"><span class="player-name">${g.name} ${isCaptain ? '<span class="multiplier-badge">1.5x CPT</span>' : ''}</span><span class="player-stats">Sal: $${g.salary.toLocaleString()}</span></div><button class="action-btn remove" onclick="removePlayer(${g.id})">Drop</button>`;
                lineupEl.appendChild(el);
            });
        }

        window.addPlayer = (id) => { const player = golfers.find(g => g.id === id); if (player) { lineup.push(player); renderPool(document.getElementById('player-search').value); renderLineup(); } };
        window.removePlayer = (id) => { lineup = lineup.filter(g => g.id !== id); renderPool(document.getElementById('player-search').value); renderLineup(); };

        function formatScore(score) {
            if (score < 0) return `<span class="score-under">${score}</span>`;
            if (score === 0) return `<span class="score-even">E</span>`;
            return `<span class="score-over">+${score}</span>`;
        }

        async function fetchDraftForUser(user, draftContainer) {
            if (draftsCache[user.userId]) {
                renderDraft(draftsCache[user.userId], draftContainer);
                return;
            }

            draftContainer.innerHTML = '<div style="text-align:center; padding: 1.5rem; color: var(--text-muted);">Syncing live draft...</div>';

            try {
                // Construct URL - ensuring IDs are clean
                const draftId = String(user.golfId).trim();
                const userId = String(user.userId).trim();
                const url = `https://web.realsports.io/games/playerratingcontest/${draftId}/view/${userId}?contestType=sport&source=home`;
                
                console.log("Fetching draft from:", url);
                
                const batch = await fetchBatchViaWorker([url]);
                const resItem = batch ? batch[0] : null;

                if (resItem && resItem.status === 200) {
                    const data = JSON.parse(base64ToText(resItem.body));
                    draftsCache[user.userId] = data.lineup || [];
                    renderDraft(draftsCache[user.userId], draftContainer);
                } else {
                    const statusText = resItem ? resItem.status : 'Empty Response';
                    throw new Error(`Worker returned status ${statusText}`);
                }
            } catch (e) {
                console.error("Draft load error:", e);
                draftContainer.innerHTML = `<div style="text-align:center; padding: 1.5rem; color: var(--danger);">Failed to load live draft: ${e.message}</div>`;
            }
        }

        function renderDraft(lineupData, container) {
            if (!lineupData || lineupData.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 2rem;">No golfers drafted.</div>';
                return;
            }

            container.innerHTML = lineupData.map(g => `
                <div class="draft-item">
                    <div class="draft-item-info">
                        <img src="${g.avatar ? `https://media.realapp.link/assets/players/default/large/${g.avatar}.webp` : 'https://placehold.co/40x40/222/fff?text=?'}" class="draft-item-avatar" onerror="this.src='https://placehold.co/34x34/111/fff?text=?'">
                        <div>
                            <span class="draft-item-name">${g.displayName}</span>
                            <span class="draft-item-mult" style="margin-left: 8px;">${g.multiplierDisplay || (g.multiplier + 'x')}</span>
                        </div>
                    </div>
                    <span class="draft-item-score">${formatScore(g.score || 0)}</span>
                </div>
            `).join('');
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-tbody');
            if (!tbody) return;
            tbody.innerHTML = '';

            users.forEach((user, index) => {
                const mainTr = document.createElement('tr');
                mainTr.className = 'main-row';
                mainTr.innerHTML = `
                    <td class="col-pos">T${index + 1}</td>
                    <td class="col-player">
                        ${user.username} 
                        <span style="font-size:0.7rem; color:var(--text-muted); font-weight:normal; margin-left:8px;">${user.golfId ? 'Live Sync' : 'No Draft'}</span>
                        <span class="toggle-icon">▼</span>
                    </td>
                    <td class="col-score">${formatScore(0)}</td>
                    <td class="col-thru">-</td>
                    <td class="col-score">${formatScore(0)}</td>
                `;

                const draftTr = document.createElement('tr');
                draftTr.className = 'draft-row';
                draftTr.innerHTML = `<td colspan="5" style="padding: 0;"><div class="draft-content"></div></td>`;
                const draftContent = draftTr.querySelector('.draft-content');

                mainTr.onclick = () => {
                    const isOpen = mainTr.classList.contains('open');
                    document.querySelectorAll('.main-row').forEach(r => r.classList.remove('open'));
                    document.querySelectorAll('.draft-row').forEach(r => r.classList.remove('open'));
                    
                    if (!isOpen) {
                        mainTr.classList.add('open');
                        draftTr.classList.add('open');
                        if (user.golfId && user.userId) fetchDraftForUser(user, draftContent);
                        else draftContent.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:1.5rem;">User missing required Golf ID or User ID.</div>';
                    }
                };

                tbody.appendChild(mainTr);
                tbody.appendChild(draftTr);
            });
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                const cleanedLine = line.trim();
                if (!cleanedLine) return [];
                const values = [];
                let currentVal = '', inQuotes = false;
                for (let i = 0; i < cleanedLine.length; i++) {
                    const char = cleanedLine[i];
                    if (char === '"' && (i === 0 || cleanedLine[i-1] !== '\\')) inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { values.push(currentVal.trim()); currentVal = ''; }
                    else currentVal += char;
                }
                values.push(currentVal.trim());
                return values;
            }).filter(row => row.length > 0);
        }

        async function fetchUsers() {
            try {
                const res = await fetch(config.usersDataUrl);
                const text = await res.text();
                const parsedData = parseCSV(text);
                if (parsedData.length < 2) return [];

                const headers = parsedData[0].map(h => h.toLowerCase().trim());
                
                // Aggressive header matching
                const uIdx = headers.findIndex(h => h.includes('username'));
                const uidIdx = headers.findIndex(h => h.includes('user id') || h.includes('userid'));
                const gidIdx = headers.findIndex(h => h.includes('golf id') || h.includes('golfid'));

                if (uIdx === -1 || uidIdx === -1) {
                    console.error("CSV Headers found:", headers);
                    return [];
                }

                return parsedData.slice(1).map(row => ({
                    userId: row[uidIdx] ? row[uidIdx].trim() : '',
                    username: row[uIdx] ? row[uIdx].trim() : '',
                    golfId: gidIdx !== -1 ? row[gidIdx].trim() : ''
                })).filter(u => u.username && u.userId);
            } catch (error) { return []; }
        }

        async function initApp() {
            document.getElementById('loading-indicator').style.display = 'block';
            users = await fetchUsers();
            document.getElementById('loading-indicator').style.display = 'none';
            renderPool();
            renderLineup();
            renderLeaderboard();
        }

        initApp();
    </script>
</body>
</html>
