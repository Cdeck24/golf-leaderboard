<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Golf Plug Leaderboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
      :root {
        --golf-green-dark: #0b3d2c;
        --golf-green-mid: #145943;
        --golf-green-bright: #2ecc71;
        --golf-fairway: #1a3a2a;
        --text-main: #f8f9fa;
        --text-muted: #a0aec0;
        --border-gold: #c5a059;
        --gold-light: #f3e5ab;
        --danger: #ff4d4d;
        --bg-body: #05140d;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        line-height: 1.4;
        background-image: radial-gradient(circle at top right, #0b3d2c 0%, #05140d 60%);
        min-height: 100vh;
        overflow-x: hidden;
      }

      header {
        background: var(--golf-green-dark);
        padding: 1.5rem 1rem 0.5rem 1rem;
        text-align: center;
        position: relative;
      }

      header::after {
          content: "";
          position: absolute;
          bottom: 0; left: 0; width: 100%; height: 1px;
          background: var(--border-gold);
          opacity: 0.8;
      }

      h1 { 
        color: var(--gold-light); 
        font-size: 1.8rem; 
        font-weight: 900;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 1rem;
      }

      .main-nav {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 6px;
          margin-bottom: 1rem;
          max-width: 600px;
          margin-left: auto;
          margin-right: auto;
      }

      .nav-tab {
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(197, 160, 89, 0.3);
          color: var(--text-muted);
          padding: 10px 4px;
          font-size: 0.65rem;
          font-weight: 800;
          text-transform: uppercase;
          border-radius: 4px;
          cursor: pointer;
          transition: all 0.2s ease;
          display: flex;
          align-items: center;
          justify-content: center;
          text-align: center;
      }

      .nav-tab.active {
          background: var(--border-gold);
          color: #000;
          border-color: var(--border-gold);
      }

      #tournament-banner {
          max-width: 1100px;
          margin: 1.5rem auto 0 auto;
          padding: 0 0.75rem;
          display: none;
      }

      .banner-content {
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 12px;
          padding: 1rem;
          text-align: center;
      }

      .banner-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--gold-light); font-weight: 700; margin-bottom: 0.25rem; }
      .banner-name { font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 0.15rem; line-height: 1.2; }
      .banner-course { font-size: 0.75rem; color: var(--text-muted); }

      .content-view {
          max-width: 1100px;
          margin: 1rem auto 3rem auto;
          padding: 0 0.75rem;
          display: none;
      }

      .content-view.active { display: block; animation: fadeIn 0.4s ease-out; }

      #loading-indicator {
          text-align: center;
          padding: 2rem;
          color: var(--gold-light);
          font-weight: 700;
          animation: pulse 1.5s infinite;
      }

      .leaderboard-panel {
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 12px;
          overflow: hidden;
          box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .leaderboard-header {
          background: #0d3326;
          padding: 1rem;
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-wrap: wrap;
          gap: 10px;
      }

      .header-actions { display: flex; align-items: center; gap: 12px; }
      .export-btn {
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid var(--border-gold);
          color: var(--gold-light);
          font-size: 0.6rem;
          padding: 6px 10px;
          border-radius: 4px;
          font-weight: 800;
          text-transform: uppercase;
      }

      .status-text { text-align: right; font-size: 0.6rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
      .sync-dot { display: inline-block; width: 6px; height: 6px; background: var(--golf-green-bright); border-radius: 50%; margin-right: 4px; }

      .golf-table-container { 
          overflow-x: auto; 
          -webkit-overflow-scrolling: touch;
          position: relative;
      }
      
      .golf-table { width: 100%; border-collapse: collapse; text-align: left; min-width: 750px; }
      
      /* Sticky Columns for Mobile */
      .golf-table th:nth-child(1), .golf-table td:nth-child(1) { position: sticky; left: 0; z-index: 10; background: #081a13; width: 45px; min-width: 45px; }
      .golf-table th:nth-child(2), .golf-table td:nth-child(2) { position: sticky; left: 45px; z-index: 10; background: #081a13; width: 140px; min-width: 140px; border-right: 1px solid rgba(255,255,255,0.05); }
      
      .golf-table th {
          background: rgba(0,0,0,0.4);
          color: var(--text-muted);
          font-size: 0.55rem;
          font-weight: 800;
          text-transform: uppercase;
          padding: 0.75rem 1rem;
          border-bottom: 1px solid rgba(255,255,255,0.05);
          white-space: nowrap;
      }

      .golf-table td { 
          padding: 0.85rem 1rem; 
          border-bottom: 1px solid rgba(255,255,255,0.02); 
          font-size: 0.85rem; 
          white-space: nowrap; 
      }

      .main-row { cursor: pointer; transition: background 0.2s; }
      .main-row:hover td { background: rgba(255, 255, 255, 0.05) !important; }
      .main-row.open { background: rgba(197, 160, 89, 0.1); }
      
      .toggle-icon { font-size: 0.5rem; color: var(--text-muted); margin-left: 4px; opacity: 0.5; transition: transform 0.3s; }
      .main-row.open .toggle-icon { transform: rotate(180deg); }

      .draft-row { display: none; background: rgba(0,0,0,0.5); }
      .draft-row.open { display: table-row; }
      
      .draft-content { 
          display: flex; gap: 10px; padding: 1rem; overflow-x: auto; scrollbar-width: none; border-left: 3px solid var(--border-gold);
      }
      .draft-content::-webkit-scrollbar { display: none; }

      .draft-item { 
          flex: 0 0 100px; display: flex; flex-direction: column; align-items: center; text-align: center;
          background: rgba(255, 255, 255, 0.03); padding: 10px 6px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .draft-item-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--border-gold); background: #000; margin-bottom: 6px; }
      .draft-item-name { color: var(--text-main); font-weight: 700; font-size: 0.65rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
      .draft-item-score { font-weight: 800; font-size: 0.85rem; color: var(--gold-light); }

      .col-pos { text-align: center; font-weight: 900; color: var(--border-gold); font-size: 1rem; }
      .col-player { font-weight: 700; color: var(--text-main); }
      .col-score { width: 70px; text-align: center; font-weight: 800; font-size: 1rem; }
      .col-day { width: 60px; text-align: center; font-weight: 600; opacity: 0.8; font-size: 0.75rem; }
      .col-raw { width: 80px; text-align: center; font-weight: 700; color: var(--gold-light); font-size: 0.8rem; }

      .score-under { color: #ff4d4d; } 
      .score-even { color: var(--golf-green-bright); } 

      .schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 1rem; }
      .schedule-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 1.25rem; transition: transform 0.2s; cursor: pointer; }
      .card-date { font-size: 0.6rem; color: var(--gold-light); font-weight: 800; margin-bottom: 0.4rem; }
      .card-name { font-size: 1rem; font-weight: 800; color: #fff; margin-bottom: 0.2rem; }
      .card-course { font-size: 0.75rem; color: var(--text-muted); }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
      
      @media (max-width: 600px) {
          h1 { font-size: 1.5rem; }
          .leaderboard-header { flex-direction: column; align-items: flex-start; }
          .header-actions { width: 100%; justify-content: space-between; }
          .status-text { text-align: right; }
          .golf-table th, .golf-table td { padding: 0.75rem 0.5rem; }
          .col-player { width: 110px !important; min-width: 110px !important; left: 40px !important; }
          .col-pos { width: 40px !important; min-width: 40px !important; }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hashids@2.2.10/dist/hashids.min.js"></script>
</head>
<body>

    <header>
        <h1>Golf Plug Leaderboard</h1>
        <div class="main-nav">
            <button id="tab-live" class="nav-tab active" onclick="switchView('live')">Live Standings</button>
            <button id="tab-upcoming" class="nav-tab" onclick="switchView('upcoming')">Upcoming Schedule</button>
            <button id="tab-past" class="nav-tab" onclick="switchView('past')">Past Archives</button>
        </div>
    </header>

    <div id="tournament-banner">
        <div class="banner-content">
            <div class="banner-label" id="display-banner-label">Tournament Status</div>
            <div class="banner-name" id="display-tournament-name">Loading Schedule...</div>
            <div class="banner-course" id="display-course-name">-</div>
        </div>
    </div>

    <div id="loading-indicator">Syncing Live Drafts...</div>

    <!-- LIVE VIEW -->
    <div id="view-live" class="content-view active">
        <div class="leaderboard-panel">
            <div class="leaderboard-header">
                <span style="font-weight: 800; font-size: 0.8rem;"><span style="margin-right: 6px;">⛳</span>STANDINGS</span>
                <div class="header-actions">
                    <button class="export-btn" onclick="exportScoresToCSV()">Export</button>
                    <div class="status-text">
                        <div id="sync-status"><span class="sync-dot"></span>LIVE</div>
                        <div id="par-score-display">EVEN: 0.0 PTS</div>
                    </div>
                </div>
            </div>
            <div class="golf-table-container">
                <table class="golf-table">
                    <thead>
                        <tr>
                            <th class="col-pos">Pos</th>
                            <th class="col-player">Username</th>
                            <th class="col-score">Total</th>
                            <th class="col-day">Thu</th>
                            <th class="col-day">Fri</th>
                            <th class="col-day">Sat</th>
                            <th class="col-day">Sun</th>
                            <th class="col-raw">Pts</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- UPCOMING VIEW -->
    <div id="view-upcoming" class="content-view">
        <div class="leaderboard-header" style="border-radius: 12px 12px 0 0;">Upcoming Tournaments</div>
        <div class="schedule-grid" id="upcoming-list"></div>
    </div>

    <!-- PAST VIEW -->
    <div id="view-past" class="content-view">
        <div class="leaderboard-header" style="border-radius: 12px 12px 0 0; display: flex; justify-content: space-between;">
            <span>Historical Archives</span>
            <label for="archive-upload" class="export-btn">Upload CSV</label>
            <input type="file" id="archive-upload" style="display: none;" accept=".csv" onchange="handleArchiveUpload(event)">
        </div>
        
        <div id="archive-viewer" style="display: none; margin-top: 1rem;">
            <div style="margin-bottom: 1rem; color: var(--gold-light); font-size: 0.7rem; font-weight: 800; cursor: pointer;" onclick="closeArchive()">← BACK TO LIST</div>
            <div class="leaderboard-panel">
                <div class="leaderboard-header" id="archive-header-title">ARCHIVE DATA</div>
                <div class="golf-table-container">
                    <table class="golf-table">
                        <thead>
                            <tr>
                                <th class="col-pos">Pos</th>
                                <th class="col-player">Username</th>
                                <th class="col-score">Score</th>
                                <th class="col-day">Thu</th>
                                <th class="col-day">Fri</th>
                                <th class="col-day">Sat</th>
                                <th class="col-day">Sun</th>
                                <th class="col-raw">Pts</th>
                            </tr>
                        </thead>
                        <tbody id="archive-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="past-tournament-grid" class="schedule-grid"></div>
    </div>

    <script>
        const config = {
            usersDataUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNfMOTfQ4xpIILu_IPjjOAZjUq2Tfp1UqEMOVnR2Qyz-H572bmiIWbC-GuUlEW7ogM8TUNLFWw5xz3/pub?gid=0&single=true&output=csv',
            scheduleUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuVpFht1S7pkLdCssZyFR6B3T0f92_cPk_qFMf2KZVm_KTPtKuKvC-2yUfF4oEFpDGIajryZpb3_oV/pub?gid=0&single=true&output=csv',
            archiveDataUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuVpFht1S7pkLdCssZyFR6B3T0f92_cPk_qFMf2KZVm_KTPtKuKvC-2yUfF4oEFpDGIajryZpb3_oV/pub?gid=949172401&single=true&output=csv',
            workerProxy: 'https://rda-worker.coledecker04.workers.dev/',
            REAL_AUTH_TOKEN: 'xnr5VpW3!ApZk8L2E!4fe6e26f-949f-4936-ae3e-16384878932f',
            REAL_VERSION: '27'
        };

        const DEVICE_UUID = crypto.randomUUID();
        let users = [];
        let masterArchiveData = [];
        let currentProcessedUsers = [];

        function switchView(viewName) {
            document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active'));
            const view = document.getElementById(`view-${viewName}`);
            if(view) view.classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            const clickedBtn = document.getElementById(`tab-${viewName}`);
            if(clickedBtn) clickedBtn.classList.add('active');
            if (viewName === 'past') closeArchive();
        }

        function closeArchive() {
            document.getElementById('archive-viewer').style.display = 'none';
            document.getElementById('past-tournament-grid').style.display = 'grid';
        }

        function generateRequestToken() {
            const timestampMs = Date.now();
            const hasher = new Hashids("realwebapp", 16);
            return hasher.encode(timestampMs);
        }

        function base64ToText(base64String) {
            if (!base64String) return '';
            try {
                const binStr = atob(base64String);
                const bytes = new Uint8Array(binStr.length);
                for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
                return new TextDecoder().decode(bytes);
            } catch (e) { return ''; }
        }

        async function fetchBatchViaWorker(urls) {
            const queryParams = new URLSearchParams();
            for (const url of urls) queryParams.append('url', url);
            const urlString = config.workerProxy + '?' + queryParams.toString();
            const fetchOptions = {
                headers: {
                    'real-auth-info': config.REAL_AUTH_TOKEN,
                    'real-device-name': 'Chrome on Web',
                    'real-device-type': 'desktop_web',
                    'real-device-uuid': DEVICE_UUID,
                    'real-request-token': generateRequestToken(),
                    'real-version': config.REAL_VERSION
                }
            };
            try {
                const res = await fetch(urlString, fetchOptions);
                if (!res.ok) throw new Error(`Worker Error: ${res.status}`);
                return await res.json();
            } catch (err) { throw err; }
        }

        const findIndex = (h, n) => { for(const name of n) { const i=h.findIndex(x=>x.toLowerCase().trim().includes(name.toLowerCase())); if(i!==-1)return i;} return -1; };

        function formatToPar(score) {
            const num = parseInt(score);
            if (isNaN(num)) return 'E';
            if (num < 0) return `<span class="score-under">${num}</span>`;
            if (num === 0) return `<span class="score-even">E</span>`;
            return `<span class="score-over">+${num}</span>`;
        }

        function calculateGolfScore(userPoints, allPoints) {
            if (userPoints === 0 || allPoints.length < 2) return 0;
            if (allPoints.every(p => p === 0)) return 0;
            const sorted = [...allPoints].sort((a, b) => a - b);
            const index = sorted.indexOf(userPoints);
            const percentileRank = (index / (sorted.length - 1)) * 100;
            return Math.round((50 - percentileRank) / 6.25);
        }

        function formatHandle(username) {
            if (!username) return '';
            let clean = username.trim();
            if (clean.startsWith('@')) return clean;
            return '@' + clean;
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            
            const syncedPlayers = users.filter(u => u.hasData);
            const totalPointsArray = syncedPlayers.map(u => u.actualTotalPoints);
            const todayPointsArray = syncedPlayers.map(u => u.actualTodayPoints);
            
            const sortedTotals = [...totalPointsArray].sort((a, b) => a - b);
            const mid = Math.floor(sortedTotals.length / 2);
            const medianTotal = sortedTotals.length % 2 !== 0 ? sortedTotals[mid] : (sortedTotals[mid - 1] + sortedTotals[mid]) / 2;
            
            document.getElementById('par-score-display').innerText = `EVEN: ${medianTotal ? medianTotal.toFixed(1) : '0.0'} PTS`;
            
            const today = new Date().getDay(); 

            currentProcessedUsers = users.map(user => {
                const golfTotal = (user.actualTotalPoints > 0) ? calculateGolfScore(user.actualTotalPoints, totalPointsArray) : 0;
                const golfToday = (user.actualTodayPoints > 0) ? calculateGolfScore(user.actualTodayPoints, todayPointsArray) : 0;
                
                let thu = user.thuScore || 0, fri = user.friScore || 0, sat = user.satScore || 0, sun = user.sunScore || 0;
                if (today === 4) thu = golfToday;
                else if (today === 5) fri = golfToday;
                else if (today === 6) sat = golfToday;
                else if (today === 0) sun = golfToday;

                return { ...user, golfTotal, golfToday, thu, fri, sat, sun };
            });

            currentProcessedUsers.sort((a, b) => a.golfTotal - b.golfTotal);

            currentProcessedUsers.forEach((user, idx) => {
                const mainTr = document.createElement('tr');
                mainTr.className = 'main-row';
                const handle = formatHandle(user.username);

                mainTr.innerHTML = `
                    <td class="col-pos">${user.hasData ? idx + 1 : '-'}</td>
                    <td class="col-player">${handle} <span class="toggle-icon">▼</span></td>
                    <td class="col-score">${formatToPar(user.golfTotal)}</td>
                    <td class="col-day">${formatToPar(user.thu)}</td>
                    <td class="col-day">${formatToPar(user.fri)}</td>
                    <td class="col-day">${formatToPar(user.sat)}</td>
                    <td class="col-day">${formatToPar(user.sun)}</td>
                    <td class="col-raw">${user.actualTotalPoints.toFixed(1)}</td>
                `;
                
                const draftTr = document.createElement('tr');
                draftTr.className = 'draft-row';
                draftTr.innerHTML = `<td colspan="8" style="padding: 0;"><div class="draft-content"></div></td>`;
                const draftContent = draftTr.querySelector('.draft-content');
                
                mainTr.onclick = () => {
                    const isOpen = mainTr.classList.contains('open');
                    document.querySelectorAll('.main-row').forEach(r => { if(r !== mainTr) r.classList.remove('open'); });
                    document.querySelectorAll('.draft-row').forEach(r => { if(r !== draftTr) r.classList.remove('open'); });
                    if (!isOpen) {
                        mainTr.classList.add('open'); draftTr.classList.add('open');
                        renderDraft(user.lineup, draftContent);
                    } else {
                        mainTr.classList.remove('open'); draftTr.classList.remove('open');
                    }
                };
                tbody.appendChild(mainTr);
                tbody.appendChild(draftTr);
            });
        }

        function renderDraft(lineupData, container) {
            if (!lineupData || lineupData.length === 0) {
                container.innerHTML = '<div style="text-align:center; flex: 1; padding: 1rem; color: var(--text-muted); font-size: 0.75rem;">Loading lineup...</div>';
                return;
            }
            container.innerHTML = lineupData.map(g => `
                <div class="draft-item">
                    <img src="${g.avatar ? `https://media.realapp.link/assets/players/default/large/${g.avatar}.webp` : 'https://placehold.co/50x50/222/fff?text=?'}" class="draft-item-avatar" onerror="this.src='https://placehold.co/40x40/111/fff?text=?'">
                    <span class="draft-item-name">${g.displayName}</span>
                    <span class="draft-item-score">${(parseFloat(g.score) || 0).toFixed(1)}</span>
                </div>
            `).join('');
        }

        async function loadAllUserScores() {
            const queue = [];
            users.forEach(u => { if (u.golfId && u.userId) queue.push({ url: `https://web.realsports.io/games/playerratingcontest/${u.golfId}/view/${u.userId}?contestType=sport&source=home`, user: u }); });
            const chunkSize = 3;
            let loaded = 0;
            const statusEl = document.getElementById('sync-status');
            while (queue.length > 0) {
                const chunk = queue.splice(0, chunkSize);
                try {
                    const results = await fetchBatchViaWorker(chunk.map(c => c.url));
                    results.forEach((res, idx) => {
                        const user = chunk[idx].user;
                        if (res.status === 200) {
                            const data = JSON.parse(base64ToText(res.body));
                            user.actualTotalPoints = parseFloat((data.info?.rankDisplayInfos?.[0]?.scoreDisplay || '0').replace(/[^0-9.]/g, '')) || 0;
                            user.lineup = data.lineup || [];
                            user.actualTodayPoints = user.lineup.reduce((acc, g) => acc + (parseFloat(g.score) || 0), 0);
                            user.hasData = true;
                        }
                        loaded++;
                    });
                    statusEl.innerHTML = `<span class="sync-dot"></span>${loaded}/${chunk.length + queue.length + loaded}`;
                    renderLeaderboard();
                } catch (e) { console.error(e); }
                await new Promise(r => setTimeout(r, 200));
            }
            statusEl.innerHTML = '<span class="sync-dot"></span>LIVE';
        }

        function exportScoresToCSV() {
            if (currentProcessedUsers.length === 0) return;
            const tournName = document.getElementById('display-tournament-name').innerText;
            const rows = [["position", "username", "user id", "total score", "thursday score", "friday score", "saturday score", "sunday score", "raw points", "tournament"]];
            currentProcessedUsers.forEach((u, index) => {
                if (!u.hasData) return;
                rows.push([index + 1, u.username, u.userId, u.golfTotal, u.thu, u.fri, u.sat, u.sun, u.actualTotalPoints.toFixed(1), tournName]);
            });
            const csvContent = rows.map(e => e.join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `golf_scores_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                const cleanedLine = line.trim(); if (!cleanedLine) return [];
                const values = []; let currentVal = '', inQuotes = false;
                for (let i = 0; i < cleanedLine.length; i++) {
                    const char = cleanedLine[i];
                    if (char === '"' && (i === 0 || cleanedLine[i-1] !== '\\')) inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { values.push(currentVal.trim()); currentVal = ''; }
                    else currentVal += char;
                }
                values.push(currentVal.trim()); return values;
            }).filter(row => row.length > 0);
        }

        async function fetchTournamentSchedule() {
            try {
                const res = await fetch(config.scheduleUrl);
                const text = await res.text();
                const rows = parseCSV(text); if (rows.length < 2) return;
                const headers = rows[0].map(h => h.toLowerCase().trim());
                const dateIdx = findIndex(headers, ['date']), tournIdx = findIndex(headers, ['tourn']), courseIdx = findIndex(headers, ['course']);
                const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const dayOfWeek = now.getDay(); 
                let currentTournRow = null, nextTournRow = null; const upcoming = [], past = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const dateParts = (row[dateIdx] || '').split('/'); if (dateParts.length < 2) continue;
                    const startDate = new Date(today.getFullYear(), parseInt(dateParts[0]) - 1, parseInt(dateParts[1]));
                    const tournObj = { name: row[tournIdx], course: row[courseIdx] || '-', date: row[dateIdx], startDate };
                    if (startDate <= today) { currentTournRow = { row, startDate }; past.unshift(tournObj); }
                    else { if (!nextTournRow) nextTournRow = { row, startDate }; upcoming.push(tournObj); }
                }
                document.getElementById('upcoming-list').innerHTML = upcoming.map(t => `<div class="schedule-card"><div class="card-date">${t.date}</div><div class="card-name">${t.name}</div><div class="card-course">${t.course}</div></div>`).join('');
                document.getElementById('past-tournament-grid').innerHTML = past.map(t => `<div class="schedule-card" onclick="viewArchive('${t.name.replace(/'/g, "\\'")}')"><div class="card-date">${t.date}</div><div class="card-name">${t.name}</div><div class="card-course">${t.course}</div></div>`).join('');
                let display = null;
                if (dayOfWeek === 3 && nextTournRow) display = { name: nextTournRow.row[tournIdx], course: nextTournRow.row[courseIdx], label: 'Live Tournament' };
                else if (dayOfWeek === 1 || dayOfWeek === 2) if (currentTournRow) display = { name: currentTournRow.row[tournIdx], course: currentTournRow.row[courseIdx], label: 'Past Tournament' };
                else if (currentTournRow) display = { name: currentTournRow.row[tournIdx], course: currentTournRow.row[courseIdx], label: 'Live Tournament' };
                if (display) {
                    document.getElementById('display-tournament-name').innerText = display.name;
                    document.getElementById('display-course-name').innerText = display.course;
                    document.getElementById('display-banner-label').innerText = display.label;
                    document.getElementById('tournament-banner').style.display = 'block';
                }
            } catch (e) { console.error(e); }
        }

        async function fetchArchiveData() {
            try {
                const res = await fetch(config.archiveDataUrl);
                const text = await res.text();
                masterArchiveData = parseCSV(text);
            } catch (e) { console.error(e); }
        }

        function viewArchive(tournamentName) {
            if (masterArchiveData.length < 2) return;
            const filtered = masterArchiveData.slice(1).filter(row => row[9] === tournamentName);
            const tbody = document.getElementById('archive-tbody');
            tbody.innerHTML = '';
            if (filtered.length === 0) tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:2rem; color:var(--text-muted);">No archived scores found.</td></tr>`;
            else {
                filtered.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="col-pos">${row[0]}</td><td class="col-player">${formatHandle(row[1])}</td><td class="col-score">${formatToPar(row[3])}</td><td class="col-day">${formatToPar(row[4])}</td><td class="col-day">${formatToPar(row[5])}</td><td class="col-day">${formatToPar(row[6])}</td><td class="col-day">${formatToPar(row[7])}</td><td class="col-raw">${row[8] || '-'}</td>`;
                    tbody.appendChild(tr);
                });
            }
            document.getElementById('archive-header-title').innerText = `${tournamentName.toUpperCase()} ARCHIVE`;
            document.getElementById('past-tournament-grid').style.display = 'none';
            document.getElementById('archive-viewer').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleArchiveUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const rows = parseCSV(e.target.result); const tbody = document.getElementById('archive-tbody');
                tbody.innerHTML = '';
                rows.slice(1).forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="col-pos">${row[0]}</td><td class="col-player">${formatHandle(row[1])}</td><td class="col-score">${formatToPar(row[3])}</td><td class="col-day">${formatToPar(row[4])}</td><td class="col-day">${formatToPar(row[5])}</td><td class="col-day">${formatToPar(row[6])}</td><td class="col-day">${formatToPar(row[7])}</td><td class="col-raw">${row[8] || '-'}</td>`;
                    tbody.appendChild(tr);
                });
                document.getElementById('archive-header-title').innerText = "LOCAL FILE ARCHIVE";
                document.getElementById('past-tournament-grid').style.display = 'none';
                document.getElementById('archive-viewer').style.display = 'block';
            };
            reader.readAsText(file);
        }

        async function fetchUsers() {
            try {
                const res = await fetch(config.usersDataUrl);
                const parsedData = parseCSV(await res.text());
                const headers = parsedData[0];
                const uIdx = findIndex(headers, ['username']), uidIdx = findIndex(headers, ['user id', 'userid']), gidIdx = findIndex(headers, ['golf id', 'golfid']);
                if (uIdx === -1 || uidIdx === -1) return [];
                return parsedData.slice(1).map(row => ({ userId: row[uidIdx].trim(), username: row[uIdx].trim(), golfId: gidIdx !== -1 ? row[gidIdx].trim() : '', actualTotalPoints: 0, actualTodayPoints: 0, hasData: false, lineup: [] })).filter(u => u.username && u.userId);
            } catch (error) { return []; }
        }

        async function initApp() {
            const indicator = document.getElementById('loading-indicator');
            await fetchTournamentSchedule(); await fetchArchiveData();
            users = await fetchUsers();
            if (indicator) indicator.style.display = 'none';
            renderLeaderboard(); loadAllUserScores();
        }
        initApp();
    </script>
</body>
</html>
