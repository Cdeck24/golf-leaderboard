<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Golf Plug Leaderboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        /* Professional Golf Palette */
        --golf-green-dark: #0b3d2c;
        --golf-green-mid: #145943;
        --golf-green-bright: #2ecc71;
        --golf-fairway: #1a3a2a;
        --golf-sand: #fdf5e6;
        --text-main: #f8f9fa;
        --text-muted: #a0aec0;
        --border-gold: #c5a059;
        --gold-light: #f3e5ab;
        --danger: #ff4d4d;
        --bg-body: #05140d;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        line-height: 1.6;
        background-image: radial-gradient(circle at top right, #0b3d2c 0%, #05140d 60%);
        min-height: 100vh;
      }

      header {
        background: var(--golf-green-dark);
        padding: 2.5rem 1.5rem;
        text-align: center;
        position: relative;
      }

      header::after {
          content: "";
          position: absolute;
          bottom: 0;
          left: 0;
          width: 100%;
          height: 1px;
          background: var(--border-gold);
          opacity: 0.8;
      }

      h1 { 
        color: var(--gold-light); 
        font-size: 2.2rem; 
        font-weight: 900;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin: 0;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      }

      /* Tournament Info Banner */
      #tournament-banner {
          max-width: 1100px;
          margin: 2rem auto 0 auto;
          padding: 0 1rem;
          display: none;
          animation: fadeIn 0.6s ease-out;
      }

      .banner-content {
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 12px;
          padding: 1rem;
          display: flex;
          flex-direction: column;
          align-items: center;
          text-align: center;
      }

      .banner-label {
          font-size: 0.6rem;
          text-transform: uppercase;
          letter-spacing: 0.2em;
          color: var(--gold-light);
          font-weight: 700;
          margin-bottom: 0.25rem;
      }

      .banner-name {
          font-size: 1.2rem;
          font-weight: 800;
          color: #fff;
          margin-bottom: 0.15rem;
      }

      .banner-course {
          font-size: 0.8rem;
          color: var(--text-muted);
      }

      .content-view {
          max-width: 1100px;
          margin: 1.5rem auto 3rem auto;
          padding: 0 1rem;
          animation: fadeIn 0.4s ease-out;
      }

      #loading-indicator {
          text-align: center;
          padding: 3rem;
          color: var(--gold-light);
          font-weight: 700;
          font-size: 1.1rem;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          animation: pulse 1.5s infinite;
      }

      /* --- Leaderboard UI --- */
      .leaderboard-panel {
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 16px;
          overflow: hidden;
          box-shadow: 0 20px 50px rgba(0,0,0,0.6);
          backdrop-filter: blur(10px);
      }

      .leaderboard-header {
          background: #0d3326;
          color: #fff;
          padding: 0.85rem 1.5rem;
          font-weight: 800;
          font-size: 0.9rem;
          border-bottom: 1px solid rgba(255,255,255,0.05);
          display: flex;
          justify-content: space-between;
          align-items: center;
          text-transform: uppercase;
          letter-spacing: 0.05em;
      }

      .header-actions {
          display: flex;
          align-items: center;
          gap: 15px;
      }

      .export-btn {
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid var(--border-gold);
          color: var(--gold-light);
          font-size: 0.6rem;
          padding: 6px 12px;
          border-radius: 4px;
          cursor: pointer;
          font-weight: 700;
          transition: all 0.2s;
          text-transform: capitalize;
      }
      .export-btn:hover {
          background: var(--border-gold);
          color: #000;
      }

      .status-text {
          text-align: right;
          font-size: 0.65rem;
          font-weight: 700;
          color: var(--text-muted);
          line-height: 1.2;
      }

      .sync-dot {
          display: inline-block;
          width: 6px;
          height: 6px;
          background: var(--golf-green-bright);
          border-radius: 50%;
          margin-right: 5px;
          vertical-align: middle;
      }

      .golf-table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .golf-table { width: 100%; border-collapse: collapse; text-align: left; min-width: 550px; }
      
      .golf-table th {
          background: rgba(0,0,0,0.2);
          color: var(--text-muted);
          font-size: 0.65rem;
          font-weight: 800;
          text-transform: uppercase;
          padding: 1rem 1.5rem;
          border-bottom: 1px solid rgba(255,255,255,0.05);
          white-space: nowrap;
          letter-spacing: 0.1em;
      }

      .golf-table td { 
          padding: 1.25rem 1.5rem; 
          border-bottom: 1px solid rgba(255,255,255,0.02); 
          font-size: 1rem; 
          white-space: nowrap; 
      }

      .main-row { cursor: pointer; transition: all 0.2s ease; }
      .main-row:hover { background: rgba(255, 255, 255, 0.05) !important; }
      .main-row.open { background: rgba(197, 160, 89, 0.1); }
      
      .toggle-icon { 
          font-size: 0.5rem; 
          color: var(--text-muted); 
          transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
          display: inline-block; 
          margin-left: 6px;
          opacity: 0.5;
      }
      .main-row.open .toggle-icon { transform: rotate(180deg); }

      .draft-row { display: none; background: rgba(0,0,0,0.5); }
      .draft-row.open { display: table-row; }
      
      .draft-content { 
          display: flex;
          gap: 12px;
          padding: 1.5rem 2rem; 
          overflow-x: auto;
          scrollbar-width: none; 
          -ms-overflow-style: none;
          border-left: 4px solid var(--border-gold);
      }
      .draft-content::-webkit-scrollbar { display: none; }

      .draft-item { 
          flex: 0 0 110px;
          display: flex; 
          flex-direction: column;
          align-items: center; 
          text-align: center;
          background: rgba(255, 255, 255, 0.03);
          padding: 12px 8px;
          border-radius: 8px;
          border: 1px solid rgba(255,255,255,0.05);
      }
      
      .draft-item-avatar { 
          width: 50px; 
          height: 50px; 
          border-radius: 50%; 
          border: 1px solid var(--border-gold); 
          background: #000;
          margin-bottom: 8px;
      }
      .draft-item-name { 
          color: var(--text-main); 
          font-weight: 700; 
          font-size: 0.7rem;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          width: 100%;
          margin-bottom: 2px;
      }
      .draft-item-score { 
          font-weight: 800; 
          font-size: 0.9rem; 
          color: var(--gold-light); 
      }
      .draft-item-mult { 
          font-size: 0.5rem; 
          background: var(--golf-green-dark); 
          padding: 1px 6px; 
          border-radius: 100px; 
          border: 1px solid var(--border-gold); 
          color: var(--gold-light); 
          font-weight: 900;
          margin-bottom: 4px;
      }

      .col-pos { width: 60px; text-align: center; font-weight: 900; color: var(--border-gold); font-size: 1.1rem; }
      .col-player { font-weight: 700; color: var(--text-main); font-size: 1rem; }
      .col-score { width: 90px; text-align: center; font-weight: 800; font-size: 1.1rem; }
      .col-thru { width: 80px; text-align: center; font-weight: 600; color: var(--text-muted); font-size: 0.85rem; }

      .score-under { color: #ff4d4d; } 
      .score-even { color: var(--golf-green-bright); } 
      .score-over { color: var(--text-main); }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
      
      @media (max-width: 600px) {
          .golf-table td, .golf-table th { padding: 0.8rem 1rem; }
          .col-pos { width: 45px; font-size: 0.95rem; }
          .col-player { font-size: 0.9rem; }
          .col-score { font-size: 1.1rem; width: 75px; }
          .col-thru { width: 60px; font-size: 0.8rem; }
          h1 { font-size: 1.4rem; }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hashids@2.2.10/dist/hashids.min.js"></script>
</head>
<body>

    <header>
        <h1>Golf Plug Leaderboard</h1>
    </header>

    <div id="tournament-banner">
        <div class="banner-content">
            <div class="banner-label" id="display-banner-label">Tournament Status</div>
            <div class="banner-name" id="display-tournament-name">Loading Schedule...</div>
            <div class="banner-course" id="display-course-name">-</div>
        </div>
    </div>

    <div id="loading-indicator">Syncing Live Drafts...</div>

    <div id="leaderboard-view" class="content-view">
        <div class="leaderboard-panel">
            <div class="leaderboard-header">
                <span><span style="margin-right: 10px;">⛳</span>Leaderboard</span>
                <div class="header-actions">
                    <button class="export-btn" onclick="exportScoresToCSV()">Export Scores</button>
                    <div class="status-text">
                        <div id="sync-status"><span class="sync-dot"></span>LIVE UPDATES</div>
                        <div id="par-score-display" style="opacity: 0.6; font-weight: 400; margin-top: 1px;">EVEN LINE: - PTS</div>
                    </div>
                </div>
            </div>
            <div class="golf-table-container">
                <table class="golf-table">
                    <thead>
                        <tr>
                            <th class="col-pos">Pos</th>
                            <th class="col-player">Player</th>
                            <th class="col-score">Total</th>
                            <th class="col-thru">Thru</th>
                            <th class="col-score">Today</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- AUTH & CONFIGURATION ---
        const config = {
            usersDataUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNfMOTfQ4xpIILu_IPjjOAZjUq2Tfp1UqEMOVnR2Qyz-H572bmiIWbC-GuUlEW7ogM8TUNLFWw5xz3/pub?gid=0&single=true&output=csv',
            scheduleUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuVpFht1S7pkLdCssZyFR6B3T0f92_cPk_qFMf2KZVm_KTPtKuKvC-2yUfF4oEFpDGIajryZpb3_oV/pub?gid=0&single=true&output=csv',
            workerProxy: 'https://rda-worker.coledecker04.workers.dev/',
            REAL_AUTH_TOKEN: 'xnr5VpW3!ApZk8L2E!4fe6e26f-949f-4936-ae3e-16384878932f',
            REAL_VERSION: '27'
        };

        const DEVICE_UUID = crypto.randomUUID();
        let users = [];
        let currentProcessedUsers = [];

        function generateRequestToken() {
            const timestampMs = Date.now();
            const hasher = new Hashids("realwebapp", 16);
            return hasher.encode(timestampMs);
        }

        function base64ToText(base64String) {
            if (!base64String) return '';
            try {
                const binStr = atob(base64String);
                const bytes = new Uint8Array(binStr.length);
                for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
                return new TextDecoder().decode(bytes);
            } catch (e) { return ''; }
        }

        async function fetchBatchViaWorker(urls) {
            const queryParams = new URLSearchParams();
            for (const url of urls) queryParams.append('url', url);
            const urlString = config.workerProxy.endsWith('?') ? config.workerProxy + queryParams.toString() : config.workerProxy + '?' + queryParams.toString();
            
            const fetchOptions = {
                headers: {
                    'real-auth-info': config.REAL_AUTH_TOKEN,
                    'real-device-name': 'Chrome on Web',
                    'real-device-type': 'desktop_web',
                    'real-device-uuid': DEVICE_UUID,
                    'real-request-token': generateRequestToken(),
                    'real-version': config.REAL_VERSION
                }
            };
            
            try {
                const res = await fetch(urlString, fetchOptions);
                if (!res.ok) throw new Error(`Worker Error: ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error("[Worker Proxy] Fetch failed:", err);
                throw err;
            }
        }

        const findIndex = (h, n) => { for(const name of n) { const i=h.findIndex(x=>x.toLowerCase().trim()===name.toLowerCase()); if(i!==-1)return i;} return -1; };

        function calculateGolfScore(userPoints, allPoints) {
            if (allPoints.length < 2) return 0;
            const sorted = [...allPoints].sort((a, b) => a - b);
            const index = sorted.indexOf(userPoints);
            const percentileRank = (index / (sorted.length - 1)) * 100;
            return Math.round((50 - percentileRank) / 6.25);
        }

        function formatToPar(score) {
            if (score < 0) return `<span class="score-under">${score}</span>`;
            if (score === 0) return `<span class="score-even">E</span>`;
            return `<span class="score-over">+${score}</span>`;
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-tbody');
            if (!tbody) return;
            tbody.innerHTML = '';

            const syncedPlayers = users.filter(u => u.hasData);
            const totalPointsArray = syncedPlayers.map(u => u.actualTotalPoints);
            const todayPointsArray = syncedPlayers.map(u => u.actualTodayPoints);
            
            const sortedTotals = [...totalPointsArray].sort((a, b) => a - b);
            const mid = Math.floor(sortedTotals.length / 2);
            const medianTotal = sortedTotals.length % 2 !== 0 ? sortedTotals[mid] : (sortedTotals[mid - 1] + sortedTotals[mid]) / 2;

            document.getElementById('par-score-display').innerText = `EVEN LINE: ${medianTotal ? medianTotal.toFixed(1) : '-'} PTS`;

            currentProcessedUsers = users.map(user => ({
                ...user,
                golfTotal: user.hasData ? calculateGolfScore(user.actualTotalPoints, totalPointsArray) : 999,
                golfToday: user.hasData ? calculateGolfScore(user.actualTodayPoints, todayPointsArray) : 0
            }));

            currentProcessedUsers.sort((a, b) => a.golfTotal - b.golfTotal);

            currentProcessedUsers.forEach((user, idx) => {
                const mainTr = document.createElement('tr');
                mainTr.className = 'main-row';
                const rankDisplay = user.hasData ? (idx + 1) : '-';

                mainTr.innerHTML = `
                    <td class="col-pos">${rankDisplay}</td>
                    <td class="col-player">
                        @${user.username} 
                        <span class="toggle-icon">▼</span>
                    </td>
                    <td class="col-score">${user.hasData ? formatToPar(user.golfTotal) : '-'}</td>
                    <td class="col-thru">${user.thru || '-'}</td>
                    <td class="col-score">${user.hasData ? formatToPar(user.golfToday) : '-'}</td>
                `;

                const draftTr = document.createElement('tr');
                draftTr.className = 'draft-row';
                draftTr.innerHTML = `<td colspan="5" style="padding: 0;"><div class="draft-content"></div></td>`;
                const draftContent = draftTr.querySelector('.draft-content');

                mainTr.onclick = () => {
                    const isOpen = mainTr.classList.contains('open');
                    document.querySelectorAll('.main-row').forEach(r => { if(r !== mainTr) r.classList.remove('open'); });
                    document.querySelectorAll('.draft-row').forEach(r => { if(r !== draftTr) r.classList.remove('open'); });
                    if (!isOpen) {
                        mainTr.classList.add('open');
                        draftTr.classList.add('open');
                        renderDraft(user.lineup, draftContent);
                    } else {
                        mainTr.classList.remove('open');
                        draftTr.classList.remove('open');
                    }
                };
                tbody.appendChild(mainTr);
                tbody.appendChild(draftTr);
            });
        }

        function renderDraft(lineupData, container) {
            if (!lineupData || lineupData.length === 0) {
                container.innerHTML = '<div style="text-align:center; flex: 1; padding: 2rem; color: var(--text-muted); font-size: 0.85rem; font-style: italic;">Syncing roster data...</div>';
                return;
            }
            container.innerHTML = lineupData.map(g => `
                <div class="draft-item">
                    <span class="draft-item-mult">${g.multiplierDisplay || (g.multiplier + 'x')}</span>
                    <img src="${g.avatar ? `https://media.realapp.link/assets/players/default/large/${g.avatar}.webp` : 'https://placehold.co/50x50/222/fff?text=?'}" class="draft-item-avatar" onerror="this.src='https://placehold.co/50x50/111/fff?text=?'">
                    <span class="draft-item-name">${g.displayName}</span>
                    <span class="draft-item-score">${(parseFloat(g.score) || 0).toFixed(1)}</span>
                </div>
            `).join('');
        }

        async function loadAllUserScores() {
            const queue = [];
            users.forEach(u => {
                if (u.golfId && u.userId) {
                    queue.push({
                        url: `https://web.realsports.io/games/playerratingcontest/${u.golfId}/view/${u.userId}?contestType=sport&source=home`,
                        user: u
                    });
                }
            });

            const chunkSize = 3;
            let loaded = 0;
            const statusEl = document.getElementById('sync-status');

            while (queue.length > 0) {
                const chunk = queue.splice(0, chunkSize);
                try {
                    const results = await fetchBatchViaWorker(chunk.map(c => c.url));
                    results.forEach((res, idx) => {
                        const user = chunk[idx].user;
                        if (res.status === 200) {
                            const data = JSON.parse(base64ToText(res.body));
                            const scoreStr = data.info?.rankDisplayInfos?.[0]?.scoreDisplay || '0';
                            user.actualTotalPoints = parseFloat(scoreStr.replace(/[^0-9.]/g, '')) || 0;
                            user.lineup = data.lineup || [];
                            user.actualTodayPoints = user.lineup.reduce((acc, g) => acc + (parseFloat(g.score) || 0), 0);
                            user.hasData = true;
                        }
                        loaded++;
                    });
                    statusEl.innerHTML = `<span class="sync-dot"></span>SYNCING... ${loaded}/${chunk.length + queue.length + loaded}`;
                    renderLeaderboard();
                } catch (e) { console.error("Batch load failed", e); }
                await new Promise(r => setTimeout(r, 200));
            }
            statusEl.innerHTML = '<span class="sync-dot"></span>LIVE UPDATES';
        }

        function exportScoresToCSV() {
            if (currentProcessedUsers.length === 0) return;
            const rows = [["Pos", "Username", "Real ID", "Total Golf Score", "Today Golf Score", "Raw Points"]];
            currentProcessedUsers.forEach((u, index) => {
                if (!u.hasData) return;
                rows.push([index + 1, u.username, u.userId, u.golfTotal, u.golfToday, u.actualTotalPoints]);
            });
            let csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            const dateStr = new Date().toISOString().split('T')[0];
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `golf_plug_scores_${dateStr}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                const cleanedLine = line.trim();
                if (!cleanedLine) return [];
                const values = [];
                let currentVal = '', inQuotes = false;
                for (let i = 0; i < cleanedLine.length; i++) {
                    const char = cleanedLine[i];
                    if (char === '"' && (i === 0 || cleanedLine[i-1] !== '\\')) inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { values.push(currentVal.trim()); currentVal = ''; }
                    else currentVal += char;
                }
                values.push(currentVal.trim());
                return values;
            }).filter(row => row.length > 0);
        }

        async function fetchTournamentSchedule() {
            try {
                const res = await fetch(config.scheduleUrl);
                const text = await res.text();
                const rows = parseCSV(text);
                if (rows.length < 2) return;
                const headers = rows[0].map(h => h.toLowerCase().trim());
                const dateIdx = headers.findIndex(h => h.includes('date'));
                const tournIdx = headers.findIndex(h => h.includes('tourn'));
                const courseIdx = headers.findIndex(h => h.includes('course'));
                if (dateIdx === -1 || tournIdx === -1) return;
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const dayOfWeek = now.getDay(); 
                let currentTournRow = null;
                let nextTournRow = null;
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row[dateIdx]) continue;
                    const dateParts = row[dateIdx].trim().split('/');
                    if (dateParts.length < 2) continue;
                    const startDate = new Date(today.getFullYear(), parseInt(dateParts[0]) - 1, parseInt(dateParts[1]));
                    if (startDate <= today) {
                        currentTournRow = { row, startDate };
                    } else if (!nextTournRow) {
                        nextTournRow = { row, startDate };
                    }
                }
                if (!currentTournRow) return;
                let display = null;
                if (dayOfWeek === 3 && nextTournRow && Math.floor((nextTournRow.startDate - today) / (1000 * 60 * 60 * 24)) <= 0) {
                    display = { name: nextTournRow.row[tournIdx], course: nextTournRow.row[courseIdx] || '-', label: 'Live Tournament' };
                } else if (dayOfWeek === 1 || dayOfWeek === 2) {
                    display = { name: currentTournRow.row[tournIdx], course: currentTournRow.row[courseIdx] || '-', label: 'Past Tournament' };
                } else if (dayOfWeek >= 3 || dayOfWeek === 0) {
                    display = { name: currentTournRow.row[tournIdx], course: currentTournRow.row[courseIdx] || '-', label: 'Live Tournament' };
                } else {
                    display = { name: currentTournRow.row[tournIdx], course: currentTournRow.row[courseIdx] || '-', label: 'Tournament Info' };
                }
                if (display) {
                    document.getElementById('display-tournament-name').innerText = display.name;
                    document.getElementById('display-course-name').innerText = display.course;
                    document.getElementById('display-banner-label').innerText = display.label;
                    document.getElementById('tournament-banner').style.display = 'block';
                }
            } catch (e) { console.error("Schedule load failed", e); }
        }

        async function fetchUsers() {
            try {
                const res = await fetch(config.usersDataUrl);
                const text = await res.text();
                const parsedData = parseCSV(text);
                if (parsedData.length < 2) return [];
                const headers = parsedData[0];
                const uIdx = findIndex(headers, ['username']);
                const uidIdx = findIndex(headers, ['user id', 'userid']);
                const gidIdx = findIndex(headers, ['golf id', 'golfid']);
                if (uIdx === -1 || uidIdx === -1) return [];
                return parsedData.slice(1).map(row => ({
                    userId: row[uidIdx] ? row[uidIdx].trim() : '',
                    username: row[uIdx] ? row[uIdx].trim() : '',
                    golfId: gidIdx !== -1 ? row[gidIdx].trim() : '',
                    actualTotalPoints: 0,
                    actualTodayPoints: 0,
                    hasData: false,
                    lineup: []
                })).filter(u => u.username && u.userId);
            } catch (error) { return []; }
        }

        async function initApp() {
            const indicator = document.getElementById('loading-indicator');
            if (indicator) indicator.style.display = 'block';
            await fetchTournamentSchedule();
            users = await fetchUsers();
            if (indicator) indicator.style.display = 'none';
            renderLeaderboard();
            loadAllUserScores();
        }
        initApp();
    </script>
</body>
</html>
