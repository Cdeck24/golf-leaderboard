<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Golf Plug Leaderboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

      :root {
        --golf-green-dark: #062118;
        --golf-green-mid: #0b3d2c;
        --golf-green-bright: #00ff88;
        --text-main: #f8f9fa;
        --text-muted: #a0aec0;
        --border-gold: #c5a059;
        --gold-glow: rgba(197, 160, 89, 0.4);
        --gold-light: #fdf2d0;
        --bg-body: #05140d;
        --danger: #ff5555;
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        line-height: 1.4;
        background-image: radial-gradient(circle at top right, #0b3d2c 0%, #05140d 60%);
        min-height: 100vh;
      }

      header {
        background: var(--golf-green-dark);
        padding: 2rem 1rem 1.5rem 1rem;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid var(--border-gold);
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      }

      header .sub-label {
          display: block;
          font-size: 0.65rem;
          font-weight: 900;
          text-transform: uppercase;
          color: var(--border-gold);
          letter-spacing: 0.4em;
          margin-bottom: 0.5rem;
      }

      h1 { 
        font-size: 1.9rem; 
        font-weight: 900; 
        letter-spacing: -0.01em; 
        text-transform: uppercase; 
        margin-bottom: 1.5rem;
        background: linear-gradient(to bottom, #fff 20%, var(--border-gold) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
      }

      .main-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 0.5rem; max-width: 600px; margin-left: auto; margin-right: auto; }
      .nav-tab { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: var(--text-muted); padding: 10px 20px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; border-radius: 25px; cursor: pointer; text-align: center; transition: all 0.2s; }
      .nav-tab.active { background: var(--border-gold); color: #000; border-color: var(--border-gold); transform: scale(1.05); box-shadow: 0 0 15px var(--gold-glow); }

      #tournament-banner { max-width: 800px; margin: 2rem auto 0 auto; padding: 0 1rem; display: none; }
      .banner-content { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
      .banner-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--gold-light); font-weight: 800; margin-bottom: 0.5rem; }
      .banner-date { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; margin-bottom: 0.4rem; letter-spacing: 0.05em; }
      .banner-name { font-size: 1.4rem; font-weight: 900; color: #fff; margin-bottom: 0.3rem; line-height: 1.1; }
      .banner-course { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; margin-bottom: 0.5rem; }
      .banner-purse { font-size: 0.75rem; color: var(--gold-light); font-weight: 800; text-transform: uppercase; margin-top: 0.5rem; }

      .champion-spotlight {
          background: linear-gradient(135deg, rgba(197, 160, 89, 0.15) 0%, rgba(11, 61, 44, 0.4) 100%);
          border: 2px solid var(--border-gold);
          border-radius: 16px;
          padding: 1.75rem;
          text-align: center;
          margin-bottom: 2rem;
          box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      }
      .champ-label { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; color: var(--border-gold); letter-spacing: 0.4em; margin-bottom: 0.5rem; }
      .champ-name { font-size: 2rem; font-weight: 900; color: #fff; margin-bottom: 0.4rem; letter-spacing: -0.01em; }
      .champ-score { font-size: 1.1rem; font-weight: 700; color: var(--gold-light); }

      .content-view { max-width: 850px; margin: 1.5rem auto 4rem auto; padding: 0 1rem; display: none; }
      .content-view.active { display: block; animation: fadeIn 0.4s ease-out; }

      .leaderboard-panel { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
      .leaderboard-header { background: rgba(13, 51, 38, 0.6); padding: 1.25rem; display: flex; justify-content: space-between; align-items: center; position: relative; }

      .export-container { position: relative; }
      .export-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-gold); color: var(--gold-light); font-size: 0.65rem; padding: 8px 16px; border-radius: 6px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
      .export-menu { 
          display: none; position: absolute; right: 0; top: 115%; background: #0a1f18; border: 1px solid var(--border-gold); 
          border-radius: 10px; z-index: 2000; min-width: 160px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); overflow: hidden;
      }
      .export-menu button { 
          width: 100%; padding: 12px 16px; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.05);
          color: #fff; font-size: 0.7rem; font-weight: 700; text-align: left; cursor: pointer; text-transform: uppercase;
      }
      .export-menu button:last-child { border-bottom: none; }
      .export-menu button:hover { background: var(--golf-green-mid); }

      .status-text { text-align: right; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
      .sync-dot { display: inline-block; width: 6px; height: 6px; background: var(--golf-green-bright); border-radius: 50%; margin-right: 6px; box-shadow: 0 0 10px var(--golf-green-bright); }

      .golf-table { width: 100%; border-collapse: collapse; text-align: left; table-layout: fixed; }
      .golf-table th { background: rgba(0,0,0,0.4); color: var(--text-muted); font-size: 0.65rem; font-weight: 900; text-transform: uppercase; padding: 1.1rem 1rem; border-bottom: 1px solid var(--glass-border); letter-spacing: 0.05em; }
      .golf-table td { padding: 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 1rem; }

      .col-pos { width: 50px; text-align: center; color: var(--border-gold); font-weight: 900; }
      .col-player { width: auto; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .col-score { width: 85px; text-align: center; font-variant-numeric: tabular-nums; }

      .score-box { display: inline-block; font-weight: 900; font-size: 1.1rem; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
      .score-box.under { color: var(--golf-green-bright); }
      .score-box.over { color: var(--danger); }
      .score-box.even { color: var(--text-main); }
      .score-box.mc { color: var(--danger); opacity: 0.8; font-size: 0.95rem; }

      .main-row { cursor: pointer; transition: background 0.2s; }
      .main-row:hover { background: rgba(255, 255, 255, 0.05); }
      .main-row.open { background: rgba(197, 160, 89, 0.08); }
      .toggle-icon { font-size: 0.5rem; color: var(--text-muted); margin-left: 4px; opacity: 0.5; transition: transform 0.3s; }
      .main-row.open .toggle-icon { transform: rotate(180deg); opacity: 1; color: var(--border-gold); }

      .cut-line-row td {
          background: rgba(255, 77, 77, 0.12) !important;
          color: var(--danger) !important;
          font-weight: 900 !important;
          font-size: 0.7rem !important;
          text-align: center !important;
          text-transform: uppercase;
          letter-spacing: 0.2em;
          padding: 12px !important;
          border-top: 1px dashed var(--danger);
          border-bottom: 1px dashed var(--danger);
      }

      .draft-row { display: none; background: rgba(0,0,0,0.45); }
      .draft-row.open { display: table-row; }
      .expanded-container { padding: 1.5rem 1rem; border-left: 4px solid var(--border-gold); }
      
      .round-breakdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.25rem; background: rgba(0,0,0,0.35); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
      .round-slot { text-align: center; }
      .round-label { font-size: 0.55rem; text-transform: uppercase; font-weight: 800; color: var(--text-muted); display: block; margin-bottom: 6px; opacity: 0.7; }
      .round-val { font-size: 1.15rem; font-weight: 900; color: var(--gold-light); display: block; margin-bottom: 3px; font-variant-numeric: tabular-nums; }
      .round-piece { font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; font-variant-numeric: tabular-nums; background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; display: inline-block; }

      .raw-pts-display { 
          font-size: 0.75rem; color: var(--gold-light); font-weight: 900; text-transform: uppercase; 
          margin-bottom: 1.5rem; text-align: center; background: rgba(255,255,255,0.08); padding: 12px; border-radius: 10px;
          font-variant-numeric: tabular-nums; border: 1px solid rgba(197, 160, 89, 0.2);
      }

      .schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; }
      .schedule-card { 
          background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border); 
          border-left: 4px solid var(--border-gold); border-radius: 12px; padding: 1.5rem; 
          cursor: pointer; transition: all 0.2s ease; position: relative; box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
          display: flex; flex-direction: column; min-height: 160px; justify-content: space-between;
      }
      .schedule-card:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-4px); border-left-color: #fff; }
      .schedule-card.clickable::after { content: "VIEW SCORES →"; font-size: 0.6rem; font-weight: 900; color: var(--border-gold); letter-spacing: 0.05em; align-self: flex-end; margin-top: 10px; }
      .card-date { font-size: 0.75rem; color: var(--gold-light); font-weight: 900; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
      .card-name { font-size: 1.25rem; font-weight: 900; color: #fff; margin-bottom: 0.3rem; line-height: 1.1; }
      .card-course { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
      .card-purse { font-size: 0.7rem; color: var(--gold-light); font-weight: 800; text-transform: uppercase; margin-top: 8px; opacity: 0.9; }

      .draft-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
      .draft-item { 
          flex: 0 0 calc(33.33% - 7px); display: flex; flex-direction: column; align-items: center; text-align: center;
          background: rgba(255, 255, 255, 0.03); padding: 12px 6px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);
          min-width: 100px;
      }
      .draft-item-avatar { width: 48px; height: 48px; min-width: 48px; min-height: 48px; border-radius: 50%; border: 2px solid var(--border-gold); background: #000; margin-bottom: 8px; object-fit: cover; overflow: hidden; display: block; }
      .draft-item-name { color: var(--text-main); font-weight: 700; font-size: 0.65rem; white-space: normal; line-height: 1.2; width: 100%; margin-bottom: 4px; }
      .draft-item-score { font-weight: 900; font-size: 0.9rem; color: var(--gold-light); font-variant-numeric: tabular-nums; }

      #loading-indicator { text-align: center; padding: 3rem; color: var(--gold-light); font-weight: 700; animation: pulse 1.5s infinite; letter-spacing: 0.2em; text-transform: uppercase; }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
      
      @media (max-width: 600px) { h1 { font-size: 1.4rem; } .golf-table th, .golf-table td { padding: 0.75rem 0.5rem; } .col-pos { width: 40px; } .col-score { width: 85px; } .nav-tab { padding: 8px 14px; font-size: 0.6rem; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hashids@2.2.10/dist/hashids.min.js"></script>
</head>
<body>

    <header>
        <span class="sub-label">The Official</span>
        <h1>Golf Plug Leaderboard</h1>
        <div class="main-nav">
            <button id="tab-live" class="nav-tab active" onclick="switchView('live')">Standings</button>
            <button id="tab-upcoming" class="nav-tab" onclick="switchView('upcoming')">Schedule</button>
            <button id="tab-past" class="nav-tab" onclick="switchView('past')">Archives</button>
        </div>
    </header>

    <div id="tournament-banner">
        <div class="banner-content">
            <div class="banner-label" id="display-banner-label">Tournament Status</div>
            <div class="banner-date" id="display-banner-date"></div>
            <div class="banner-name" id="display-tournament-name">Loading Schedule...</div>
            <div class="banner-course" id="display-course-name">-</div>
            <div class="banner-purse" id="display-purse"></div>
        </div>
    </div>

    <div id="loading-indicator">Syncing Tournament Data...</div>

    <div id="view-live" class="content-view active">
        <div class="leaderboard-panel">
            <div class="leaderboard-header">
                <span style="font-weight: 900; font-size: 0.8rem; letter-spacing: 0.05em;"><span style="margin-right: 8px;">⛳</span>STANDINGS</span>
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="export-container">
                        <button class="export-btn" id="export-main-btn" onclick="toggleExportMenu()">Export</button>
                        <div id="export-menu" class="export-menu">
                            <button onclick="exportDay('thursday')">Export Thu</button>
                            <button onclick="exportDay('friday')">Export Fri</button>
                            <button onclick="exportDay('saturday')">Export Sat</button>
                            <button onclick="exportDay('sunday')">Export Sun</button>
                            <button onclick="exportScoresToCSV()" style="color:var(--gold-light);">Export Full Records</button>
                        </div>
                    </div>
                    <div class="status-text">
                        <div id="sync-status"><span class="sync-dot"></span>LIVE</div>
                        <div id="par-score-display">EVEN: 0.00 PTS</div>
                    </div>
                </div>
            </div>
            <table class="golf-table">
                <thead><tr><th class="col-pos">Pos</th><th class="col-player">Player</th><th class="col-score">Total</th><th class="col-score">Today</th></tr></thead>
                <tbody id="leaderboard-tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="view-upcoming" class="content-view">
        <div class="schedule-grid" id="upcoming-list"></div>
    </div>

    <div id="view-past" class="content-view">
        <div id="archive-viewer" style="display:none;">
            <div style="margin-bottom:1.5rem; color:var(--border-gold); font-size:0.75rem; font-weight:800; cursor:pointer;" onclick="closeArchive()">← BACK TO ARCHIVES</div>
            <div id="archive-champ-display"></div>
            <div class="leaderboard-panel">
                <div class="leaderboard-header" id="archive-header-title">ARCHIVE DATA</div>
                <table class="golf-table">
                    <thead><tr><th class="col-pos">Pos</th><th class="col-player">Player</th><th class="col-score">Final</th><th class="col-score">Points</th></tr></thead>
                    <tbody id="archive-tbody"></tbody>
                </table>
            </div>
        </div>
        <div id="past-tournament-grid" class="schedule-grid"></div>
    </div>

    <script>
        const config = {
            usersDataUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNfMOTfQ4xpIILu_IPjjOAZjUq2Tfp1UqEMOVnR2Qyz-H572bmiIWbC-GuUlEW7ogM8TUNLFWw5xz3/pub?gid=0&single=true&output=csv',
            scheduleUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuVpFht1S7pkLdCssZyFR6B3T0f92_cPk_qFMf2KZVm_KTPtKuKvC-2yUfF4oEFpDGIajryZpb3_oV/pub?gid=0&single=true&output=csv',
            archiveDataUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuVpFht1S7pkLdCssZyFR6B3T0f92_cPk_qFMf2KZVm_KTPtKuKvC-2yUfF4oEFpDGIajryZpb3_oV/pub?gid=949172401&single=true&output=csv',
            dailyDataUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuVpFht1S7pkLdCssZyFR6B3T0f92_cPk_qFMf2KZVm_KTPtKuKvC-2yUfF4oEFpDGIajryZpb3_oV/pub?gid=435355414&single=true&output=csv',
            workerProxy: 'https://rda-worker.coledecker04.workers.dev/',
            REAL_AUTH_TOKEN: 'xnr5VpW3!ApZk8L2E!4fe6e26f-949f-4936-ae3e-16384878932f',
            REAL_VERSION: '31' 
        };

        const DEVICE_UUID = crypto.randomUUID();
        const REFERENCE_IDS = ['jvbb41pv', 'R37kAWO3', 'gv8D5Q0v', '9JmXRKDn'].map(id => id.toLowerCase().trim());
        
        let users = [];
        let historicalDailyDataByDate = {}; 
        let masterArchiveData = [];
        let currentProcessedUsers = [];
        let activeTournamentStartDate = null;
        let globalCutScoreFri = 99;

        function switchView(v) {
            document.querySelectorAll('.content-view').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${v}`).classList.add('active');
            if (v === 'past') closeArchive();
        }

        function closeArchive() {
            document.getElementById('archive-viewer').style.display = 'none';
            document.getElementById('past-tournament-grid').style.display = 'grid';
        }

        function formatToPar(score) {
            const n = parseInt(score);
            if (isNaN(n) || n === 0) return '<div class="score-box even">E</div>';
            const formatted = n > 0 ? `+${n}` : n;
            const cls = n < 0 ? 'under' : 'over';
            return `<div class="score-box ${cls}">${formatted}</div>`;
        }

        function toggleExportMenu() {
            const menu = document.getElementById('export-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function calculateGolfScore(val, pool) {
            if (isNaN(val) || pool.length < 2) return 0;
            const sorted = [...pool].sort((a,b) => a - b);
            const idx = sorted.indexOf(val);
            if (idx === -1) return 0;
            const pr = idx / (sorted.length - 1);
            const z = (pr * 2) - 1; 
            return Math.round(z > 0 ? (-6 * Math.pow(z, 3)) : (-5 * Math.pow(z, 3)));
        }

        function formatHandle(u) { if(!u) return ''; let c = u.trim(); while(c.startsWith('@')) c = c.substring(1); return '@' + c; }

        function getLineupSignature(lineup) {
            if (!lineup || lineup.length === 0) return "";
            return lineup.map(g => (g.displayName || g.player?.displayName || "").trim()).sort().join('|');
        }

        function getFormattedDate(base, daysToAdd) {
            const d = new Date(base);
            d.setDate(d.getDate() + daysToAdd);
            return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
        }

        function base64ToText(b) {
            try {
                if (!b) return '';
                const decoded = window.atob(b.replace(/-/g, '+').replace(/_/g, '/'));
                const bytes = new Uint8Array(decoded.length);
                for (let i = 0; i < decoded.length; i++) bytes[i] = decoded.charCodeAt(i);
                return new TextDecoder().decode(bytes);
            } catch(e) { return ''; }
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            
            const now = new Date();
            const todayStr = (now.getMonth() + 1) + '/' + now.getDate() + '/' + now.getFullYear();
            const tDates = [];
            if (activeTournamentStartDate) {
                for (let i = 0; i < 4; i++) tDates.push(getFormattedDate(activeTournamentStartDate, i));
            }

            const refSigs = [];
            users.filter(u => u.hasData).forEach(u => {
                if (REFERENCE_IDS.includes(u.userId.toLowerCase().trim())) {
                    const sig = getLineupSignature(u.lineup);
                    if (sig) refSigs.push(sig);
                }
            });

            const playerStates = users.map(u => {
                const normId = u.userId.trim().toLowerCase();
                const hist = historicalDailyDataByDate[normId] || {};
                const pts = [0, 0, 0, 0];
                tDates.forEach((d, i) => {
                    if (hist[d]) pts[i] = hist[d].raw;
                    else if (d === todayStr && u.hasData) pts[i] = u.actualTodayPoints;
                });
                const isWD = u.hasData && (!u.lineup || u.lineup.length === 0);
                const sig = getLineupSignature(u.lineup);
                const isRef = REFERENCE_IDS.includes(normId);
                const isDup = !isRef && sig !== "" && refSigs.includes(sig);
                
                // FIXED Logic: Strict tolerance check to eliminate artifacts like -0.00
                const dayPieces = [pts[0], 0, 0, 0];
                for (let i = 1; i < 4; i++) {
                    if (pts[i] !== 0 && pts[i-1] !== 0) {
                        const diff = pts[i] - pts[i-1];
                        dayPieces[i] = Math.abs(diff) < 0.01 ? 0 : diff;
                    }
                }

                return { ...u, pts, dayPieces, isWD, isDuplicate: isDup };
            });

            const pools = [[], [], [], []];
            tDates.forEach((_, i) => {
                playerStates.forEach(p => {
                    if (!p.isWD && !p.isDuplicate) {
                        const piece = p.dayPieces[i];
                        if (Math.abs(piece) > 0.01) pools[i].push(piece);
                    }
                });
            });

            const activeIdx = tDates.indexOf(todayStr);
            const sortedPool = [...(activeIdx !== -1 ? pools[activeIdx] : [])].sort((a,b) => a - b);
            const medianVal = sortedPool.length ? (sortedPool.length % 2 ? sortedPool[Math.floor(sortedPool.length/2)] : (sortedPool[sortedPool.length/2-1] + sortedPool[sortedPool.length/2])/2) : 0;
            document.getElementById('par-score-display').innerText = `EVEN: ${medianVal.toFixed(2)} ${activeIdx === 0 ? 'PTS' : 'IMPROVE'}`;

            // Friday Cut Logic
            const friField = playerStates.map(p => {
                const thuG = Math.abs(p.dayPieces[0]) > 0.01 ? calculateGolfScore(p.dayPieces[0], pools[0]) : 0;
                const friG = Math.abs(p.dayPieces[1]) > 0.01 ? calculateGolfScore(p.dayPieces[1], pools[1]) : 0;
                return { userId: p.userId, totFri: thuG + friG, isWD: p.isWD, isDup: p.isDuplicate };
            }).filter(f => !f.isWD && !f.isDup);
            friField.sort((a,b) => a.totFri - b.totFri);
            const cutIdxFri = Math.floor(friField.length * 0.45);
            globalCutScoreFri = friField.length > 0 ? friField[Math.max(0, cutIdxFri - 1)].totFri : 99;

            const slotKeys = ['thu', 'fri', 'sat', 'sun'];
            currentProcessedUsers = playerStates.map(p => {
                let rounds = { thu: 0, fri: 0, sat: 0, sun: 0 };
                rounds.thu = Math.abs(p.dayPieces[0]) > 0.01 ? calculateGolfScore(p.dayPieces[0], pools[0]) : 0;
                rounds.fri = Math.abs(p.dayPieces[1]) > 0.01 ? calculateGolfScore(p.dayPieces[1], pools[1]) : 0;
                
                const madeCut = (rounds.thu + rounds.fri) <= globalCutScoreFri;
                if (madeCut) {
                    rounds.sat = Math.abs(p.dayPieces[2]) > 0.01 ? calculateGolfScore(p.dayPieces[2], pools[2]) : 0;
                    rounds.sun = Math.abs(p.dayPieces[3]) > 0.01 ? calculateGolfScore(p.dayPieces[3], pools[3]) : 0;
                } else {
                    rounds.sat = 0; rounds.sun = 0;
                }
                const total = rounds.thu + rounds.fri + rounds.sat + rounds.sun;
                return { ...p, total, today: activeIdx !== -1 ? rounds[slotKeys[activeIdx]] : 0, rounds, actualTotalPoints: (activeIdx !== -1 && p.pts[activeIdx] !== 0) ? p.pts[activeIdx] : (p.hasData ? p.actualTotalPoints : 0), madeCut };
            });

            currentProcessedUsers.sort((a, b) => {
                if (a.isDuplicate !== b.isDuplicate) return a.isDuplicate ? 1 : -1;
                if (a.isWD !== b.isWD) return a.isWD ? 1 : -1;
                if (a.madeCut !== b.madeCut) return a.madeCut ? -1 : 1; 
                if (a.total !== b.total) return a.total - b.total;
                return b.actualTotalPoints - a.actualTotalPoints;
            });

            let cutLineInserted = false;
            currentProcessedUsers.forEach((u, i) => {
                if (!cutLineInserted && !u.madeCut && !u.isWD && !u.isDuplicate) {
                    const row = document.createElement('tr'); row.className = 'cut-line-row';
                    row.innerHTML = `<td colspan="4">${activeIdx < 2 ? 'EXPECTED CUT LINE' : 'OFFICIAL CUT LINE'} (${formatToPar(globalCutScoreFri)})</td>`;
                    tbody.appendChild(row); cutLineInserted = true;
                }
                const row = document.createElement('tr'); row.className = 'main-row';
                const tag = u.isDuplicate ? '<span style="color:var(--danger); font-size:0.6rem;">(DUP)</span>' : (activeIdx >= 2 && !u.madeCut ? '<span style="color:var(--danger); font-size:0.6rem;">(MC)</span>' : '');
                row.innerHTML = `<td class="col-pos">${u.isDuplicate?'DUP':(u.isWD?'WD':(u.hasData?currentProcessedUsers.indexOf(u)+1:'-'))}</td><td class="col-player">${formatHandle(u.username)} ${tag} <span class="toggle-icon">▼</span></td><td class="col-score">${(u.isWD||u.isDuplicate)?'-':formatToPar(u.total)}</td><td class="col-score">${(u.isWD||u.isDuplicate)?'-':formatToPar(u.today)}</td>`;
                
                const dr = document.createElement('tr'); dr.className = 'draft-row';
                const satVal = u.madeCut ? formatToPar(u.rounds.sat) : '<div class="score-box mc">MC</div>';
                const sunVal = u.madeCut ? formatToPar(u.rounds.sun) : '<div class="score-box mc">MC</div>';
                const sanitize = (val) => (val === 0 ? 0 : val).toFixed(2);

                dr.innerHTML = `<td colspan="4"><div class="expanded-container"><div class="round-breakdown">
                    <div class="round-slot"><span class="round-label">Thu</span><span class="round-val">${(u.isWD||u.isDuplicate)?'-':formatToPar(u.rounds.thu)}</span><span class="round-piece">${sanitize(u.dayPieces[0])} PTS</span></div>
                    <div class="round-slot"><span class="round-label">Fri</span><span class="round-val">${(u.isWD||u.isDuplicate)?'-':formatToPar(u.rounds.fri)}</span><span class="round-piece">${sanitize(u.dayPieces[1])} PTS</span></div>
                    <div class="round-slot"><span class="round-label">Sat</span><span class="round-val">${(u.isWD||u.isDuplicate)?'-':satVal}</span><span class="round-piece">${sanitize(u.dayPieces[2])} PTS</span></div>
                    <div class="round-slot"><span class="round-label">Sun</span><span class="round-val">${(u.isWD||u.isDuplicate)?'-':sunVal}</span><span class="round-piece">${sanitize(u.dayPieces[3])} PTS</span></div>
                </div><div class="raw-pts-display">Total Raw Score: ${u.actualTotalPoints.toFixed(2)} ${u.isWD?'(WD)':''}</div><div class="draft-grid"></div></div></td>`;
                
                row.onclick = function() {
                    const isOpen = this.classList.contains('open');
                    document.querySelectorAll('.main-row').forEach(r => r.classList.remove('open'));
                    document.querySelectorAll('.draft-row').forEach(r => r.classList.remove('open'));
                    if (!isOpen) { this.classList.add('open'); dr.classList.add('open'); renderDraft(u, dr.querySelector('.draft-grid')); }
                };
                tbody.appendChild(row); tbody.appendChild(dr);
            });
        }

        function renderDraft(u, container) {
            if (!u.hasData) { container.innerHTML = '<div style="flex:1; text-align:center; font-size:0.7rem; padding:10px;">Syncing...</div>'; return; }
            if (u.isWD || u.isDuplicate) { container.innerHTML = `<div style="flex:1; text-align:center; font-size:0.7rem; color:var(--danger); padding:10px;">${u.isWD?'PLAYER WITHDRAWN':'DUPLICATE ENTRY'}</div>`; return; }
            container.innerHTML = u.lineup.map(g => `<div class="draft-item"><img src="${(g.avatar||g.player?.avatar) ? `https://media.realapp.link/assets/players/default/large/${g.avatar||g.player.avatar}.webp` : 'https://placehold.co/48x48/111/fff?text=?'}" class="draft-item-avatar" onerror="this.src='https://placehold.co/48x48/111/fff?text=?'"><span class="draft-item-name">${g.displayName||g.player?.displayName||'Unknown'}</span><span class="draft-item-score">${(parseFloat(g.score)||0).toFixed(2)}</span></div>`).join('');
        }

        function generateCSV(rows, filename) {
            const blob = new Blob([rows.map(e => e.join(",")).join("\n")], { type: 'text/csv' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = filename; link.click();
        }

        function exportScoresToCSV() {
            const rows = [["position", "username", "user id", "status", "total_golf", "thu_golf", "fri_golf", "sat_golf", "sun_golf", "total_raw", "thu_raw", "fri_raw", "sat_raw", "sun_raw"]];
            currentProcessedUsers.forEach((u, i) => { 
                if(u.hasData) {
                    let status = u.madeCut ? "MADE CUT" : "MISSED CUT";
                    if (u.isWD) status = "WD"; else if (u.isDuplicate) status = "DUP";
                    rows.push([
                        u.isWD?'WD':(u.isDuplicate?'DUP':i+1), 
                        u.username, 
                        u.userId, 
                        status,
                        u.total, 
                        u.rounds.thu, u.rounds.fri, u.rounds.sat, u.rounds.sun,
                        u.actualTotalPoints.toFixed(2),
                        u.pts[0].toFixed(2), u.pts[1].toFixed(2), u.pts[2].toFixed(2), u.pts[3].toFixed(2)
                    ]); 
                }
            });
            generateCSV(rows, `golf_plug_full_records.csv`);
            document.getElementById('export-menu').style.display = 'none';
        }

        function exportDay(dayName) {
            const d = new Date(activeTournamentStartDate);
            d.setDate(d.getDate() + ({thursday:0, friday:1, saturday:2, sunday:3}[dayName]||0));
            const dateStr = (d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();
            const rows = [["username", "user id", "raw points", "golf score", "date"]];
            currentProcessedUsers.forEach(u => rows.push([u.username, u.userId, u.actualTotalPoints.toFixed(2), u.rounds[dayName.substring(0,3)], dateStr]));
            generateCSV(rows, `golf_plug_${dayName}_${dateStr.replace(/\//g, '-')}.csv`);
            document.getElementById('export-menu').style.display = 'none';
        }

        const findIdx = (h, n) => { for(const name of n) { const i = h.findIndex(x => x.toLowerCase().trim().includes(name.toLowerCase())); if(i !== -1) return i; } return -1; };

        async function fetchDailyHistoricalData() {
            try {
                const res = await fetch(config.dailyDataUrl);
                const text = await res.text();
                const rows = parseCSV(text);
                const h = rows[0].map(v => v.toLowerCase().trim());
                const uIdx = findIdx(h, ['user id', 'userid']), dIdx = findIdx(h, ['date']), rIdx = findIdx(h, ['raw points', 'raw pts']), gIdx = findIdx(h, ['golf score']);
                if (uIdx === -1 || dIdx === -1) return;
                rows.slice(1).forEach(r => {
                    const uid = r[uIdx]?.trim().toLowerCase(); const date = r[dIdx]?.trim();
                    if (!uid || !date) return;
                    if (!historicalDailyDataByDate[uid]) historicalDailyDataByDate[uid] = {};
                    historicalDailyDataByDate[uid][date] = { score: parseFloat(r[gIdx]) || 0, raw: parseFloat(r[rIdx]) || 0 };
                });
            } catch (e) {}
        }

        async function loadAllUserScores() {
            const q = [...users].filter(u => u.golfId && u.userId);
            const chunkS = 3; let loaded = 0; const statusEl = document.getElementById('sync-status');
            const hasher = new Hashids("realwebapp", 16);
            while (q.length > 0) {
                const chunk = q.splice(0, chunkS);
                try {
                    const query = new URLSearchParams(); chunk.forEach(item => query.append('url', `https://web.realsports.io/games/playerratingcontest/${item.golfId}/view/${item.userId}?contestType=sport&source=home`));
                    const opts = { headers: { 'real-auth-info': config.REAL_AUTH_TOKEN, 'real-device-name': 'Chrome', 'real-device-type': 'desktop_web', 'real-device-uuid': DEVICE_UUID, 'real-request-token': hasher.encode(Date.now()), 'real-version': config.REAL_VERSION } };
                    const res = await (await fetch(`${config.workerProxy}?${query.toString()}`, opts)).json();
                    res.forEach((r, idx) => {
                        const user = chunk[idx];
                        if (r.status === 200) {
                            try {
                                const data = JSON.parse(base64ToText(r.body));
                                user.actualTotalPoints = parseFloat((data.info?.rankDisplayInfos?.[0]?.scoreDisplay || '0').replace(/[^0-9.]/g, '')) || 0;
                                user.lineup = data.lineup || [];
                                user.actualTodayPoints = user.lineup.reduce((acc, g) => acc + (parseFloat(g.score) || 0), 0);
                                user.hasData = true;
                            } catch(e) {}
                        }
                        loaded++;
                    });
                    statusEl.innerHTML = `<span class="sync-dot"></span>${loaded}/${chunk.length + q.length + loaded}`;
                    renderLeaderboard();
                } catch (e) {}
                await new Promise(r => setTimeout(r, 250));
            }
            statusEl.innerHTML = '<span class="sync-dot"></span>LIVE';
        }

        function parseCSV(t) { return t.split(/\r?\n/).map(l => { const v=[]; let c='', q=false; for(let i=0;i<l.length;i++){ if(l[i]==='"' && l[i-1]!=='\\') q=!q; else if(l[i]===',' && !q){ v.push(c.trim()); c=''; } else c+=l[i]; } v.push(c.trim()); return v; }).filter(r => r.length > 1); }

        async function fetchTournamentSchedule() {
            try {
                const res = await fetch(config.scheduleUrl);
                const rows = parseCSV(await res.text());
                const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const h = rows[0].map(v => v.toLowerCase().trim());
                const dIdx = findIdx(h, ['date']), nIdx = findIdx(h, ['tourn', 'tournament']), cIdx = findIdx(h, ['course']), pIdx = findIdx(h, ['purse']);
                const upcoming = [], past = []; let curr = null, next = null;
                for (let i = 1; i < rows.length; i++) {
                    const r = rows[i]; const p = (r[dIdx] || '').split('/'); if (p.length < 2) continue;
                    const start = new Date(today.getFullYear(), parseInt(p[0]) - 1, parseInt(p[1]));
                    const end = new Date(start); end.setDate(end.getDate() + 3);
                    const rangeStr = `${start.getMonth()+1}/${start.getDate()} - ${end.getMonth()+1}/${end.getDate()}`;
                    const obj = { name: r[nIdx], course: r[cIdx] || '-', date: rangeStr, purse: r[pIdx] || '', start };
                    if (start <= today) { curr = obj; past.unshift(obj); } else { if (!next) next = obj; upcoming.push(obj); }
                }
                document.getElementById('upcoming-list').innerHTML = upcoming.map(t => `<div class="schedule-card"><div class="card-date">${t.date}</div><div class="card-name">${t.name}</div><div class="card-course">${t.course}</div>${t.purse ? `<div class="card-purse">Purse: ${t.purse}</div>` : ''}</div>`).join('');
                document.getElementById('past-tournament-grid').innerHTML = past.map(t => `<div class="schedule-card clickable" onclick="viewArchive('${t.name.replace(/'/g, "\\'")}')"><div class="card-date">${t.date}</div><div class="card-name">${t.name}</div><div class="card-course">${t.course}</div>${t.purse ? `<div class="card-purse">Purse: ${t.purse}</div>` : ''}</div>`).join('');
                let d = (now.getDay() === 3 && next) ? { ...next, label: 'Live Tournament' } : (now.getDay() === 1 || now.getDay() === 2) ? { ...curr, label: 'Past Tournament' } : { ...curr, label: 'Live Tournament' };
                if (d && d.name) { 
                    activeTournamentStartDate = d.start; 
                    document.getElementById('display-tournament-name').innerText = d.name; 
                    document.getElementById('display-course-name').innerText = d.course; 
                    document.getElementById('display-banner-label').innerText = d.label; 
                    document.getElementById('display-banner-date').innerText = d.date;
                    document.getElementById('display-purse').innerText = d.purse ? `Purse: ${d.purse}` : ''; 
                    document.getElementById('tournament-banner').style.display = 'block'; 
                }
            } catch (e) {}
        }

        async function fetchUsers() {
            try {
                const rows = parseCSV(await (await fetch(config.usersDataUrl)).text());
                const h = rows[0].map(v => v.toLowerCase().trim());
                const uIdx = findIdx(h, ['username']), uidIdx = findIdx(h, ['user id', 'userid']), gidIdx = findIdx(h, ['golf id', 'golfid']);
                return rows.slice(1).map(r => ({ userId: r[uidIdx].trim(), username: r[uIdx].trim(), golfId: gidIdx !== -1 ? r[gidIdx].trim() : '', actualTotalPoints: 0, hasData: false, lineup: [] })).filter(u => u.username && u.userId);
            } catch (e) { return []; }
        }

        function viewArchive(name) {
            const h = masterArchiveData[0].map(v => v.toLowerCase().trim());
            const tIdx = findIdx(h, ['tournament', 'tourn']);
            const filtered = masterArchiveData.slice(1).filter(r => r[tIdx] === name);
            const tbody = document.getElementById('archive-tbody');
            const champDiv = document.getElementById('archive-champ-display');
            const valid = filtered.filter(r => r[3] !== '-' && r[3] !== 'WD' && r[3] !== 'DUP');
            const sortedVal = [...valid].sort((a,b) => parseInt(a[3]) - parseInt(b[3]));
            const archCutScore = sortedVal.length > 0 ? parseInt(sortedVal[Math.max(0, Math.floor(sortedVal.length * 0.45) - 1)][3]) : 99;

            if (sortedVal.length > 0) {
                const winner = sortedVal[0];
                champDiv.innerHTML = `<div class="champion-spotlight"><div class="champ-label">Tournament Champion</div><div class="champ-name">🏆 ${formatHandle(winner[1])}</div><div class="champ-score">Final Score: ${parseInt(winner[3]) > 0 ? '+' : ''}${winner[3]} (${parseFloat(winner[8]).toFixed(2)} PTS)</div></div>`;
            } else { champDiv.innerHTML = ''; }

            const processedArchive = filtered.map(r => ({ r, score: parseInt(r[3]), madeCut: parseInt(r[3]) <= archCutScore }));
            processedArchive.sort((a,b) => {
                if (a.madeCut !== b.madeCut) return a.madeCut ? -1 : 1;
                return a.score - b.score;
            });

            let cutInserted = false;
            tbody.innerHTML = '';
            processedArchive.forEach((item) => {
                if (!cutInserted && !item.madeCut) {
                    const cr = document.createElement('tr'); cr.className = 'cut-line-row';
                    cr.innerHTML = `<td colspan="4">OFFICIAL CUT LINE (${formatToPar(archCutScore)})</td>`;
                    tbody.appendChild(cr); cutInserted = true;
                }
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="col-pos">${item.r[0]}</td><td class="col-player">${formatHandle(item.r[1])}</td><td class="col-score">${formatToPar(item.r[3])}</td><td class="col-score">${parseFloat(item.r[8]).toFixed(2)}</td>`;
                tbody.appendChild(tr);
            });
            document.getElementById('archive-header-title').innerText = `${name.toUpperCase()} ARCHIVE`;
            document.getElementById('past-tournament-grid').style.display = 'none';
            document.getElementById('archive-viewer').style.display = 'block';
        }

        async function initApp() {
            await fetchTournamentSchedule(); 
            await (async () => { try { masterArchiveData = parseCSV(await (await fetch(config.archiveDataUrl)).text()); } catch (e) {} })();
            await fetchDailyHistoricalData();
            users = await fetchUsers();
            document.getElementById('loading-indicator').style.display = 'none';
            renderLeaderboard(); loadAllUserScores();
        }
        initApp();
    </script>
</body>
</html>
