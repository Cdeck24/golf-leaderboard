<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Golf Plug Leaderboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        /* Professional Golf Palette */
        --golf-green-dark: #0b3d2c; /* Classic Masters Green */
        --golf-green-mid: #145943;
        --golf-green-bright: #2ecc71;
        --golf-fairway: #1a3a2a;
        --golf-sand: #fdf5e6;
        --text-main: #f8f9fa;
        --text-muted: #a0aec0;
        --border-gold: #c5a059;
        --gold-light: #f3e5ab;
        --danger: #ff4d4d;
        --bg-body: #05140d;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        line-height: 1.6;
        background-image: radial-gradient(circle at top right, #0b3d2c 0%, #05140d 60%);
        min-height: 100vh;
      }

      header {
        background: linear-gradient(180deg, var(--golf-green-dark) 0%, rgba(5, 20, 13, 0.8) 100%);
        padding: 2.5rem 1.5rem;
        border-bottom: 2px solid var(--border-gold);
        text-align: center;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      }

      h1 { 
        color: var(--gold-light); 
        font-size: 2.2rem; 
        font-weight: 800;
        letter-spacing: -0.02em;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      }

      .sub-nav-container {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-top: 1.5rem;
      }

      .sub-nav-btn {
        background: rgba(197, 160, 89, 0.1);
        border: 1px solid var(--border-gold);
        color: var(--gold-light);
        font-size: 0.85rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 0.6rem 1.5rem;
        border-radius: 4px;
        cursor: default;
      }

      .content-view {
          max-width: 1100px;
          margin: 2rem auto;
          padding: 0 1rem;
          animation: fadeIn 0.4s ease-out;
      }

      #loading-indicator {
          text-align: center;
          padding: 3rem;
          color: var(--gold-light);
          font-weight: 700;
          font-size: 1.1rem;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          animation: pulse 1.5s infinite;
      }

      /* --- Leaderboard UI --- */
      .leaderboard-panel {
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 16px;
          overflow: hidden;
          box-shadow: 0 20px 50px rgba(0,0,0,0.6);
          backdrop-filter: blur(10px);
      }

      .leaderboard-header {
          background: linear-gradient(90deg, #0b3d2c, #1a4d3a);
          color: #fff;
          padding: 1.25rem 2rem;
          font-weight: 800;
          font-size: 1.1rem;
          border-bottom: 1px solid var(--border-gold);
          display: flex;
          justify-content: space-between;
          align-items: center;
          text-transform: uppercase;
          letter-spacing: 0.05em;
      }

      .golf-table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .golf-table { width: 100%; border-collapse: collapse; text-align: left; min-width: 500px; }
      
      .golf-table th {
          background: rgba(0,0,0,0.3);
          color: var(--text-muted);
          font-size: 0.7rem;
          font-weight: 800;
          text-transform: uppercase;
          padding: 1rem 1.5rem;
          border-bottom: 1px solid rgba(255,255,255,0.1);
          white-space: nowrap;
          letter-spacing: 0.1em;
      }

      .golf-table td { 
          padding: 1.25rem 1.5rem; 
          border-bottom: 1px solid rgba(255,255,255,0.05); 
          font-size: 1rem; 
          white-space: nowrap; 
      }

      .main-row { cursor: pointer; transition: all 0.2s ease; }
      .main-row:hover { background: rgba(255, 255, 255, 0.07) !important; }
      .main-row.open { background: rgba(197, 160, 89, 0.12); }
      
      .toggle-icon { 
          font-size: 0.6rem; 
          color: var(--gold-light); 
          transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
          display: inline-block; 
          margin-left: 10px;
          opacity: 0.6;
      }
      .main-row.open .toggle-icon { transform: rotate(180deg); opacity: 1; }

      .draft-row { display: none; background: rgba(0,0,0,0.5); }
      .draft-row.open { display: table-row; }
      
      /* Horizontal Lineup Scrolling */
      .draft-content { 
          display: flex;
          gap: 12px;
          padding: 1.5rem; 
          overflow-x: auto;
          scrollbar-width: none; /* Firefox */
          -ms-overflow-style: none;  /* IE/Edge */
          border-left: 4px solid var(--border-gold);
      }
      .draft-content::-webkit-scrollbar { display: none; } /* Chrome/Safari */

      .draft-item { 
          flex: 0 0 100px;
          display: flex; 
          flex-direction: column;
          align-items: center; 
          text-align: center;
          background: rgba(255,255,255,0.05);
          padding: 12px 8px;
          border-radius: 8px;
          border: 1px solid rgba(255,255,255,0.1);
      }
      
      .draft-item-avatar { 
          width: 50px; 
          height: 50px; 
          border-radius: 50%; 
          border: 2px solid var(--border-gold); 
          background: #000;
          margin-bottom: 8px;
      }
      .draft-item-name { 
          color: var(--text-main); 
          font-weight: 700; 
          font-size: 0.75rem;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          width: 100%;
          margin-bottom: 4px;
      }
      .draft-item-score { 
          font-weight: 800; 
          font-size: 1rem; 
          color: var(--gold-light); 
      }
      .draft-item-mult { 
          font-size: 0.55rem; 
          background: var(--golf-green-dark); 
          padding: 1px 6px; 
          border-radius: 100px; 
          border: 1px solid var(--border-gold); 
          color: var(--gold-light); 
          font-weight: 900;
          text-transform: uppercase;
          margin-bottom: 4px;
      }

      .col-pos { width: 60px; text-align: center; font-weight: 800; color: var(--gold-light); font-size: 1.1rem; }
      .col-player { font-weight: 700; color: var(--text-main); font-size: 1.1rem; }
      .col-score { width: 90px; text-align: center; font-weight: 800; font-size: 1.2rem; border-left: 1px solid rgba(255,255,255,0.05); }
      .col-thru { width: 70px; text-align: center; font-weight: 600; color: var(--text-muted); font-size: 0.8rem; }

      .score-under { color: #ff4d4d; }
      .score-even { color: var(--golf-green-bright); }
      .score-over { color: var(--text-main); }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
      
      /* Mobile optimization */
      @media (max-width: 600px) {
          .golf-table td, .golf-table th { padding: 0.8rem 1rem; }
          .col-pos { width: 45px; font-size: 0.95rem; }
          .col-player { font-size: 0.95rem; }
          .col-score { font-size: 1.1rem; width: 75px; }
          .col-thru { width: 60px; font-size: 0.75rem; }
          .draft-content { padding: 1rem; gap: 8px; }
          .draft-item { flex: 0 0 85px; padding: 10px 5px; }
          .draft-item-avatar { width: 40px; height: 40px; }
          h1 { font-size: 1.6rem; }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hashids@2.2.10/dist/hashids.min.js"></script>
</head>
<body>

    <header>
        <h1>Golf Plug Leaderboard</h1>
        <div class="sub-nav-container">
            <div class="sub-nav-btn">Live Tournament Rankings</div>
        </div>
    </header>

    <div id="loading-indicator">Syncing Tournament Field...</div>

    <div id="leaderboard-view" class="content-view">
        <div class="leaderboard-panel">
            <div class="leaderboard-header">
                <span><span style="margin-right: 8px;">⛳</span>Standings</span>
                <div style="text-align: right;">
                    <div id="sync-status" style="font-size: 0.7rem; font-weight: 700; color: var(--gold-light); opacity: 0.8;">Loading...</div>
                    <div id="avg-score-display" style="font-size: 0.6rem; color: var(--text-muted); font-weight: 400; margin-top: 2px; text-transform: uppercase;">Avg: -</div>
                </div>
            </div>
            <div class="golf-table-container">
                <table class="golf-table">
                    <thead>
                        <tr>
                            <th class="col-pos">Pos</th>
                            <th class="col-player">Player</th>
                            <th class="col-score">Total</th>
                            <th class="col-thru">Thru</th>
                            <th class="col-score">Today</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- AUTH & CONFIGURATION ---
        const config = {
            usersDataUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRNfMOTfQ4xpIILu_IPjjOAZjUq2Tfp1UqEMOVnR2Qyz-H572bmiIWbC-GuUlEW7ogM8TUNLFWw5xz3/pub?gid=0&single=true&output=csv', 
            workerProxy: 'https://rda-worker.coledecker04.workers.dev/',
            REAL_AUTH_TOKEN: 'xnr5VpW3!ApZk8L2E!4fe6e26f-949f-4936-ae3e-16384878932f',
            REAL_VERSION: '27'
        };

        const DEVICE_UUID = crypto.randomUUID();
        let users = [];

        function generateRequestToken() {
            const timestampMs = Date.now();
            // @ts-ignore
            const hasher = new Hashids("realwebapp", 16);
            return hasher.encode(timestampMs);
        }

        function base64ToText(base64String) {
            if (!base64String) return '';
            try {
                const binStr = atob(base64String);
                const bytes = new Uint8Array(binStr.length);
                for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
                return new TextDecoder().decode(bytes);
            } catch (e) { return ''; }
        }

        async function fetchBatchViaWorker(urls) {
            const queryParams = new URLSearchParams();
            for (const url of urls) queryParams.append('url', url);
            const urlString = config.workerProxy.endsWith('?') ? config.workerProxy + queryParams.toString() : config.workerProxy + '?' + queryParams.toString();
            
            const fetchOptions = {
                headers: {
                    'real-auth-info': config.REAL_AUTH_TOKEN,
                    'real-device-name': 'Chrome on Web',
                    'real-device-type': 'desktop_web',
                    'real-device-uuid': DEVICE_UUID,
                    'real-request-token': generateRequestToken(),
                    'real-version': config.REAL_VERSION
                }
            };
            
            try {
                const res = await fetch(urlString, fetchOptions);
                if (!res.ok) throw new Error(`Worker Error: ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error("[Worker Proxy] Fetch failed:", err);
                throw err;
            }
        }

        const findIndex = (h, n) => { for(const name of n) { const i=h.findIndex(x=>x.toLowerCase().trim()===name.toLowerCase()); if(i!==-1)return i;} return -1; };

        function formatRelativeScore(score) {
            const num = Math.round(score);
            if (num < 0) return `<span class="score-under">${num}</span>`;
            if (num === 0) return `<span class="score-even">E</span>`;
            return `<span class="score-over">+${num}</span>`;
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-tbody');
            if (!tbody) return;
            tbody.innerHTML = '';

            const syncedPlayers = users.filter(u => u.hasData);
            const totalPoints = syncedPlayers.reduce((acc, u) => acc + u.actualTotalPoints, 0);
            const avgPoints = syncedPlayers.length > 0 ? (totalPoints / syncedPlayers.length) : 0;

            document.getElementById('avg-score-display').innerText = `Field Avg: ${avgPoints.toFixed(1)} pts`;

            const sortedUsers = [...users].sort((a, b) => b.actualTotalPoints - a.actualTotalPoints);

            sortedUsers.forEach((user, idx) => {
                const relativeTotal = user.hasData ? (avgPoints - user.actualTotalPoints) : 0;
                const relativeToday = user.hasData ? (user.actualTodayPoints - (avgPoints/6)) : 0;

                const mainTr = document.createElement('tr');
                mainTr.className = 'main-row';
                
                const rankDisplay = user.hasData ? (idx + 1) : '-';

                mainTr.innerHTML = `
                    <td class="col-pos">${rankDisplay}</td>
                    <td class="col-player">
                        ${user.username} 
                        <span class="toggle-icon">▼</span>
                    </td>
                    <td class="col-score">${user.hasData ? formatRelativeScore(relativeTotal) : '-'}</td>
                    <td class="col-thru">${user.thru || '-'}</td>
                    <td class="col-score">${user.hasData ? formatRelativeScore(relativeToday) : '-'}</td>
                `;

                const draftTr = document.createElement('tr');
                draftTr.className = 'draft-row';
                draftTr.innerHTML = `<td colspan="5" style="padding: 0;"><div class="draft-content"></div></td>`;
                const draftContent = draftTr.querySelector('.draft-content');

                mainTr.onclick = () => {
                    const isOpen = mainTr.classList.contains('open');
                    document.querySelectorAll('.main-row').forEach(r => { if(r !== mainTr) r.classList.remove('open'); });
                    document.querySelectorAll('.draft-row').forEach(r => { if(r !== draftTr) r.classList.remove('open'); });
                    
                    if (!isOpen) {
                        mainTr.classList.add('open');
                        draftTr.classList.add('open');
                        renderDraft(user.lineup, draftContent, avgPoints / 6);
                    } else {
                        mainTr.classList.remove('open');
                        draftTr.classList.remove('open');
                    }
                };

                tbody.appendChild(mainTr);
                tbody.appendChild(draftTr);
            });
        }

        function renderDraft(lineupData, container, slotAvg) {
            if (!lineupData || lineupData.length === 0) {
                container.innerHTML = '<div style="text-align:center; flex: 1; padding: 2rem; color: var(--text-muted); font-size: 0.9rem; font-style: italic;">Syncing lineup...</div>';
                return;
            }

            container.innerHTML = lineupData.map(g => {
                const golferRelScore = slotAvg - (parseFloat(g.score) || 0);
                return `
                <div class="draft-item">
                    <span class="draft-item-mult">${g.multiplierDisplay || (g.multiplier + 'x')}</span>
                    <img src="${g.avatar ? `https://media.realapp.link/assets/players/default/large/${g.avatar}.webp` : 'https://placehold.co/40x40/222/fff?text=?'}" class="draft-item-avatar" onerror="this.src='https://placehold.co/40x40/111/fff?text=?'">
                    <span class="draft-item-name">${g.displayName}</span>
                    <span class="draft-item-score">${formatRelativeScore(golferRelScore)}</span>
                </div>
            `}).join('');
        }

        async function loadAllUserScores() {
            const queue = [];
            users.forEach(u => {
                if (u.golfId && u.userId) {
                    queue.push({
                        url: `https://web.realsports.io/games/playerratingcontest/${u.golfId}/view/${u.userId}?contestType=sport&source=home`,
                        user: u
                    });
                }
            });

            const chunkSize = 3;
            let loaded = 0;
            const statusEl = document.getElementById('sync-status');

            while (queue.length > 0) {
                const chunk = queue.splice(0, chunkSize);
                try {
                    const results = await fetchBatchViaWorker(chunk.map(c => c.url));
                    results.forEach((res, idx) => {
                        const user = chunk[idx].user;
                        if (res.status === 200) {
                            const data = JSON.parse(base64ToText(res.body));
                            const scoreStr = data.info?.rankDisplayInfos?.[0]?.scoreDisplay || '0';
                            user.actualTotalPoints = parseFloat(scoreStr.replace(/[^0-9.]/g, '')) || 0;
                            user.lineup = data.lineup || [];
                            user.actualTodayPoints = user.lineup.reduce((acc, g) => acc + (parseFloat(g.score) || 0), 0);
                            user.hasData = true;
                        }
                        loaded++;
                    });
                    if (statusEl) statusEl.innerText = `${loaded}/${chunk.length + queue.length + loaded} SYNCED`;
                    renderLeaderboard();
                } catch (e) { console.error("Batch load failed", e); }
                await new Promise(r => setTimeout(r, 200));
            }
            if (statusEl) statusEl.innerText = '● LIVE SYNC';
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                const cleanedLine = line.trim();
                if (!cleanedLine) return [];
                const values = [];
                let currentVal = '', inQuotes = false;
                for (let i = 0; i < cleanedLine.length; i++) {
                    const char = cleanedLine[i];
                    if (char === '"' && (i === 0 || cleanedLine[i-1] !== '\\')) inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { values.push(currentVal.trim()); currentVal = ''; }
                    else currentVal += char;
                }
                values.push(currentVal.trim());
                return values;
            }).filter(row => row.length > 0);
        }

        async function fetchUsers() {
            try {
                const res = await fetch(config.usersDataUrl);
                const text = await res.text();
                const parsedData = parseCSV(text);
                if (parsedData.length < 2) return [];

                const headers = parsedData[0];
                const uIdx = findIndex(headers, ['username']);
                const uidIdx = findIndex(headers, ['user id', 'userid']);
                const gidIdx = findIndex(headers, ['golf id', 'golfid']);

                if (uIdx === -1 || uidIdx === -1) return [];

                return parsedData.slice(1).map(row => ({
                    userId: row[uidIdx] ? row[uidIdx].trim() : '',
                    username: row[uIdx] ? row[uIdx].trim() : '',
                    golfId: gidIdx !== -1 ? row[gidIdx].trim() : '',
                    actualTotalPoints: 0,
                    actualTodayPoints: 0,
                    rankStr: '-',
                    thru: '-',
                    hasData: false,
                    lineup: []
                })).filter(u => u.username && u.userId);
            } catch (error) { return []; }
        }

        async function initApp() {
            const indicator = document.getElementById('loading-indicator');
            if (indicator) indicator.style.display = 'block';

            users = await fetchUsers();
            if (indicator) indicator.style.display = 'none';
            
            renderLeaderboard();
            loadAllUserScores();
        }

        initApp();
    </script>
</body>
</html>
